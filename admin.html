<title>CaseSnap — Admin Panel</title>
<style>
  :root {
    --bg:        #F8F4EC;
    --surface:   #FFFFFF;
    --surface2:  #F3EFE6;
    --ink:       #1A150D;
    --ink-muted: #6E5A3C;
    --accent:    #B5580A;
    --accent-h:  #CC6610;
    --accent-t:  #FFFFFF;
    --border:    #DDD0B8;
    --shadow:    0 2px 20px rgba(181,88,10,.09), 0 1px 4px rgba(181,88,10,.06);
    --tag-bg:    rgba(181,88,10,.07);
    --ring:      rgba(181,88,10,.12);
    --good:      #1B7A4B;
    --good-bg:   rgba(27,122,75,.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #0F0B06;
      --surface:   #1A1208;
      --surface2:  #221A0C;
      --ink:       #F0E8D8;
      --ink-muted: #A0845A;
      --accent:    #F09830;
      --accent-h:  #F5AA48;
      --accent-t:  #100C04;
      --border:    #2E2214;
      --shadow:    0 2px 28px rgba(0,0,0,.50), 0 1px 5px rgba(0,0,0,.35);
      --tag-bg:    rgba(240,152,48,.09);
      --ring:      rgba(240,152,48,.10);
      --good:      #34D399;
      --good-bg:   rgba(52,211,153,.08);
    }
  }
  :root[data-theme="dark"] {
    --bg: #0F0B06; --surface: #1A1208; --surface2: #221A0C;
    --ink: #F0E8D8; --ink-muted: #A0845A; --accent: #F09830; --accent-h: #F5AA48;
    --accent-t: #100C04; --border: #2E2214;
    --shadow: 0 2px 28px rgba(0,0,0,.50), 0 1px 5px rgba(0,0,0,.35);
    --tag-bg: rgba(240,152,48,.09); --ring: rgba(240,152,48,.10);
    --good: #34D399; --good-bg: rgba(52,211,153,.08);
  }
  :root[data-theme="light"] {
    --bg: #F8F4EC; --surface: #FFFFFF; --surface2: #F3EFE6;
    --ink: #1A150D; --ink-muted: #6E5A3C; --accent: #B5580A; --accent-h: #CC6610;
    --accent-t: #FFFFFF; --border: #DDD0B8;
    --shadow: 0 2px 20px rgba(181,88,10,.09), 0 1px 4px rgba(181,88,10,.06);
    --tag-bg: rgba(181,88,10,.07); --ring: rgba(181,88,10,.12);
    --good: #1B7A4B; --good-bg: rgba(27,122,75,.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── Top nav ─────────────────────────────────────────────── */
  .topnav {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 24px;
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: grid; place-items: center;
    font-size: 11px; font-weight: 800;
    color: var(--accent-t);
    flex-shrink: 0;
    user-select: none;
  }

  .logo-name { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }

  .admin-badge {
    font-size: 10px; font-weight: 700; letter-spacing: .06em;
    text-transform: uppercase;
    background: var(--tag-bg);
    color: var(--accent);
    border: 1px solid var(--ring);
    border-radius: 100px;
    padding: 2px 9px;
  }

  .topnav-end {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .admin-info {
    font-size: 12.5px;
    color: var(--ink-muted);
  }

  .btn-logout {
    padding: 6px 14px;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink-muted);
    font-family: inherit;
    transition: border-color .15s, color .15s;
  }
  .btn-logout:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Page body ────────────────────────────────────────────── */
  .page { max-width: 1100px; margin: 0 auto; padding: 28px 24px 60px; }

  .page-title {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: -.3px;
    margin-bottom: 4px;
  }
  .page-sub { font-size: 13px; color: var(--ink-muted); margin-bottom: 24px; }

  /* ── Stat cards ───────────────────────────────────────────── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -.5px;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  .stat-value.accent { color: var(--accent); }

  /* ── Table wrapper ────────────────────────────────────────── */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-wrap: wrap;
  }

  .table-title { font-size: 13px; font-weight: 700; }

  .search-input {
    padding: 7px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    color: var(--ink);
    background: var(--bg);
    font-family: inherit;
    outline: none;
    width: 220px;
    transition: border-color .15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--ink-muted); opacity: .5; }

  .table-scroll { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; min-width: 680px; }

  thead th {
    padding: 10px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--ink-muted);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--accent); }
  thead th.sorted { color: var(--accent); }
  thead th.sorted::after { content: ' ↓'; }
  thead th.sorted.asc::after { content: ' ↑'; }

  thead th.num { text-align: right; }

  tbody tr { transition: background .12s; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr + tr { border-top: 1px solid var(--border); }

  td { padding: 12px 16px; vertical-align: middle; }

  td.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    color: var(--ink);
  }

  .user-cell { display: flex; align-items: center; gap: 10px; }

  .av-mini {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--tag-bg);
    border: 1.5px solid var(--ring);
    display: grid; place-items: center;
    font-size: 11px; font-weight: 800;
    color: var(--accent);
    flex-shrink: 0;
    letter-spacing: -.2px;
  }

  .user-name { font-weight: 600; font-size: 13.5px; }
  .user-id   { font-size: 11.5px; color: var(--ink-muted); margin-top: 1px; }

  .badge-admin {
    display: inline-block;
    font-size: 9.5px; font-weight: 700;
    letter-spacing: .05em; text-transform: uppercase;
    background: var(--good-bg);
    color: var(--good);
    border-radius: 100px;
    padding: 1px 7px;
    margin-left: 5px;
    vertical-align: middle;
  }

  .td-date, .td-rel { font-size: 12.5px; color: var(--ink-muted); white-space: nowrap; }

  .btn-pw-reset {
    padding: 3px 10px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--ink-muted);
    font-family: inherit;
    transition: border-color .15s, color .15s;
    white-space: nowrap;
  }
  .btn-pw-reset:hover { border-color: var(--accent); color: var(--accent); }

  .empty-row td {
    text-align: center;
    padding: 48px 20px;
    color: var(--ink-muted);
    font-size: 13px;
  }

  /* ── Refresh / loading ────────────────────────────────────── */
  .btn-refresh {
    padding: 6px 14px;
    background: var(--accent);
    color: var(--accent-t);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12.5px;
    font-weight: 600;
    font-family: inherit;
    transition: background .15s;
  }
  .btn-refresh:hover { background: var(--accent-h); }
  .btn-refresh:disabled { opacity: .4; cursor: not-allowed; }

  .loading-row td {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-muted);
    font-size: 13px;
  }

  @media (max-width: 600px) {
    .page { padding: 20px 16px 48px; }
    .search-input { width: 100%; }
    .topnav { padding: 0 16px; }
  }
</style>

<!-- Top nav -->
<nav class="topnav">
  <div class="logo-mark">CS</div>
  <span class="logo-name">CaseSnap</span>
  <span class="admin-badge">Admin</span>
  <div class="topnav-end">
    <span class="admin-info" id="admin-name"></span>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</nav>

<div class="page">
  <h1 class="page-title">User Activity</h1>
  <p class="page-sub">All registered users and their progress — live from Supabase.</p>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total Users</div>
      <div class="stat-value accent" id="stat-users">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Active Today</div>
      <div class="stat-value" id="stat-active">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Cases Solved</div>
      <div class="stat-value" id="stat-solved">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Mock Rounds</div>
      <div class="stat-value" id="stat-rounds">—</div>
    </div>
  </div>

  <!-- User table -->
  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Registered Users</span>
      <div style="display:flex;gap:8px;align-items:center">
        <input class="search-input" type="text" placeholder="Search name or email…" id="search-input" oninput="applyFilter()">
        <button class="btn-refresh" id="btn-refresh" onclick="loadData()">Refresh</button>
      </div>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('name')">User</th>
            <th onclick="sortBy('created_at')">Joined</th>
            <th class="num" onclick="sortBy('cases')">Cases</th>
            <th class="num" onclick="sortBy('mastered')">Mastered</th>
            <th class="num" onclick="sortBy('streak')">Streak</th>
            <th class="num" onclick="sortBy('rounds')">Rounds</th>
            <th onclick="sortBy('last_active')">Last Active</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="user-tbody">
          <tr class="loading-row"><td colspan="7">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ── Auth guard ──────────────────────────────────────────────────────────
(function() {
  const s = JSON.parse(localStorage.getItem('cs_session') || 'null');
  if (!s) { location.replace('index.html'); return; }
  if (!s.isAdmin) { location.replace('dashboard.html'); return; }
  document.getElementById('admin-name').textContent = s.name;
}());

const SB_URL = 'https://pniqqakcyoncvmarkazy.supabase.co';
const SB_KEY = 'sb_publishable_ZEAmDgmC9GaQBQuC7wA8jw_GLrbxoSD';
const H = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };

let allRows = []; // { user, prog } merged
let sortKey = 'last_active';
let sortAsc = false;

function logout() {
  localStorage.removeItem('cs_session');
  location.replace('index.html');
}

async function loadData() {
  const btn = document.getElementById('btn-refresh');
  btn.disabled = true; btn.textContent = 'Loading…';
  try {
    const [uRes, pRes] = await Promise.all([
      fetch(SB_URL + '/rest/v1/cs_users?select=*&order=created_at.desc', { headers: H }),
      fetch(SB_URL + '/rest/v1/cs_progress?select=*', { headers: H })
    ]);
    const users = await uRes.json();
    const progs = await pRes.json();
    const progMap = {};
    progs.forEach(p => progMap[p.user_id] = p);
    allRows = users.map(u => ({ user: u, prog: progMap[u.id] || {} }));
    updateStats();
    applyFilter();
  } catch (e) {
    document.getElementById('user-tbody').innerHTML =
      '<tr class="empty-row"><td colspan="7">Failed to load — check connection and try Refresh.</td></tr>';
  } finally {
    btn.disabled = false; btn.textContent = 'Refresh';
  }
}

function updateStats() {
  const now = Date.now();
  let activeToday = 0, totalSolved = 0, totalRounds = 0;
  allRows.forEach(({ user, prog }) => {
    const lastDate = user.last_active_at ? new Date(user.last_active_at).getTime() : 0;
    if (now - lastDate < 864e5) activeToday++;
    totalSolved  += (prog.cases_solved?.length  || 0);
    totalRounds  += (prog.rounds_done           || 0);
  });
  document.getElementById('stat-users').textContent  = allRows.length;
  document.getElementById('stat-active').textContent = activeToday;
  document.getElementById('stat-solved').textContent = totalSolved;
  document.getElementById('stat-rounds').textContent = totalRounds;
}

function sortBy(key) {
  if (sortKey === key) { sortAsc = !sortAsc; }
  else { sortKey = key; sortAsc = false; }
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted', 'asc');
    if (th.getAttribute('onclick') === 'sortBy(\'' + key + '\')') {
      th.classList.add('sorted');
      if (sortAsc) th.classList.add('asc');
    }
  });
  applyFilter();
}

function applyFilter() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  let rows = allRows.filter(({ user }) =>
    !q || user.name.toLowerCase().includes(q) || user.email_or_phone.toLowerCase().includes(q)
  );

  rows.sort((a, b) => {
    let va, vb;
    if      (sortKey === 'name')        { va = a.user.name.toLowerCase(); vb = b.user.name.toLowerCase(); }
    else if (sortKey === 'created_at')  { va = a.user.created_at || ''; vb = b.user.created_at || ''; }
    else if (sortKey === 'cases')       { va = a.prog.cases_solved?.length  || 0; vb = b.prog.cases_solved?.length  || 0; }
    else if (sortKey === 'mastered')    { va = a.prog.cases_mastered?.length || 0; vb = b.prog.cases_mastered?.length || 0; }
    else if (sortKey === 'streak')      { va = a.prog.streak      || 0; vb = b.prog.streak      || 0; }
    else if (sortKey === 'rounds')      { va = a.prog.rounds_done || 0; vb = b.prog.rounds_done || 0; }
    else /* last_active */              { va = a.user.last_active_at || ''; vb = b.user.last_active_at || ''; }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  renderRows(rows);
}

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}

function relTime(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const min = Math.floor(diff / 60000);
  if (min < 2)   return 'Just now';
  if (min < 60)  return min + 'm ago';
  const h = Math.floor(min / 60);
  if (h < 24)    return h + 'h ago';
  const d = Math.floor(h / 24);
  if (d === 1)   return 'Yesterday';
  if (d < 7)     return d + 'd ago';
  return formatDate(iso);
}

function renderRows(rows) {
  const tbody = document.getElementById('user-tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="7">No users found</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(({ user, prog }) => {
    const initials = user.name.trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
    const adminBadge = user.is_admin ? '<span class="badge-admin">Admin</span>' : '';
    const solved   = prog.cases_solved?.length   || 0;
    const mastered = prog.cases_mastered?.length  || 0;
    const streak   = prog.streak      || 0;
    const rounds   = prog.rounds_done || 0;
    return `<tr>
      <td>
        <div class="user-cell">
          <div class="av-mini">${initials}</div>
          <div>
            <div class="user-name">${esc(user.name)}${adminBadge}</div>
            <div class="user-id">${esc(user.email_or_phone)}</div>
          </div>
        </div>
      </td>
      <td class="td-date">${formatDate(user.created_at)}</td>
      <td class="num">${solved}</td>
      <td class="num">${mastered}</td>
      <td class="num">${streak}</td>
      <td class="num">${rounds}</td>
      <td class="td-rel">${relTime(user.last_active_at)}</td>
      <td><button class="btn-pw-reset" onclick="resetPassword('${user.id}', '${esc(user.name)}')">Reset PW</button></td>
    </tr>`;
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function resetPassword(userId, userName) {
  const newPw = prompt('Set new password for ' + userName + ':\n(Must be 8+ chars with uppercase, lowercase, number, symbol)');
  if (!newPw) return;
  if (newPw.length < 8) { alert('Password too short — minimum 8 characters.'); return; }

  const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(newPw));
  const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');

  const res = await fetch(SB_URL + '/rest/v1/cs_users?id=eq.' + userId, {
    method: 'PATCH',
    headers: { ...H, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ password_hash: hash })
  });
  if (res.ok) {
    alert('Password for ' + userName + ' has been reset.');
  } else {
    alert('Failed to reset password — try again.');
  }
}

loadData();
</script>
