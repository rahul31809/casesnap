<title>CaseSnap — Frameworks</title>
<style>

}

  --bg:#0F0B06;--surface:#1A1208;--surface2:#201608;--ink:#F0E8D8;--ink-muted:#A0845A;
  --accent:#F09830;--accent-h:#F5AA48;--accent-text:#100C04;--border:#2E2214;
  --tag-bg:rgba(240,152,48,.10);--tag-bd:rgba(240,152,48,.22);--shadow:0 2px 36px rgba(0,0,0,.55);
  --sb-bg:#100C04;--sb-ink:#D8C8A8;--sb-muted:#7A6040;--sb-hover:rgba(240,152,48,.07);--sb-active:rgba(240,152,48,.13);
}}
:root[data-theme="dark"]{--bg:#0F0B06;--surface:#1A1208;--surface2:#201608;--ink:#F0E8D8;--ink-muted:#A0845A;--accent:#F09830;--accent-h:#F5AA48;--accent-text:#100C04;--border:#2E2214;--tag-bg:rgba(240,152,48,.10);--tag-bd:rgba(240,152,48,.22);--shadow:0 2px 36px rgba(0,0,0,.55);--sb-bg:#100C04;--sb-ink:#D8C8A8;--sb-muted:#7A6040;--sb-hover:rgba(240,152,48,.07);--sb-active:rgba(240,152,48,.13);}
:root[data-theme="light"]{--bg:#F8F4EC;--surface:#FFFFFF;--surface2:#F2EDE4;--ink:#1A150D;--ink-muted:#6E5A3C;--accent:#B5580A;--accent-h:#CC6610;--accent-text:#FFFFFF;--border:#DDD0B8;--tag-bg:rgba(181,88,10,.08);--tag-bd:rgba(181,88,10,.18);--shadow:0 2px 20px rgba(181,88,10,.10);--sb-bg:#1A1208;--sb-ink:#D8C8A8;--sb-muted:#8A7458;--sb-hover:rgba(240,152,48,.09);--sb-active:rgba(240,152,48,.14);}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);height:100dvh;display:flex;overflow:hidden;}

/* Sidebar */
.sidebar{width:var(--sb-w);flex-shrink:0;background:var(--sb-bg);display:flex;flex-direction:column;padding:20px 0 16px;overflow:hidden;}
.sb-logo{display:flex;align-items:center;gap:9px;padding:0 18px 22px;border-bottom:1px solid rgba(255,255,255,.05);}
.sb-mark{width:30px;height:30px;background:var(--accent);border-radius:8px;display:grid;place-items:center;font-size:11px;font-weight:800;color:var(--accent-text);flex-shrink:0;}
.sb-name{font-size:14.5px;font-weight:700;color:var(--sb-ink);letter-spacing:-.3px;}
.sb-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.sb-nav a{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13.5px;font-weight:500;color:var(--sb-muted);text-decoration:none;transition:background .15s,color .15s;white-space:nowrap;}
.sb-nav a:hover{background:var(--sb-hover);color:var(--sb-ink);}
.sb-nav a.active{background:var(--sb-active);color:var(--accent);font-weight:600;}
.sb-nav a svg{flex-shrink:0;opacity:.7;}
.sb-nav a.active svg{opacity:1;}
.sb-section{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--sb-muted);padding:10px 10px 4px;opacity:.6;}
.sb-user{margin:0 10px;padding:10px;border-radius:8px;background:rgba(255,255,255,.04);display:flex;align-items:center;gap:9px;}
.sb-avatar{width:28px;height:28px;border-radius:50%;background:rgba(181,88,10,.4);display:grid;place-items:center;font-size:11px;font-weight:700;color:#F5D0A0;flex-shrink:0;}
.sb-user-name{font-size:12.5px;font-weight:600;color:var(--sb-ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-user-phase{font-size:11px;color:var(--sb-muted);}
.sb-logout{display:flex;align-items:center;gap:6px;width:calc(100% - 20px);margin:4px 10px 10px;padding:7px 10px;background:none;border:none;cursor:pointer;color:var(--sb-muted);font-size:11.5px;font-family:inherit;border-radius:7px;transition:background .12s,color .12s;text-align:left;}
.sb-logout:hover{background:rgba(255,255,255,.06);color:var(--sb-ink);}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ── TRACK SELECTION VIEW ── */
#view-tracks{flex:1;overflow-y:auto;padding:28px 28px 48px;}
.tracks-header{margin-bottom:24px;}
.tracks-title{font-size:20px;font-weight:800;letter-spacing:-.4px;color:var(--ink);}
.tracks-sub{font-size:13px;color:var(--ink-muted);margin-top:4px;}
.tracks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}

.track-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:22px 22px 18px;display:flex;flex-direction:column;gap:0;cursor:pointer;transition:border-color .18s,box-shadow .18s,transform .15s;}
.track-card:hover{border-color:var(--accent);box-shadow:0 0 0 3px var(--tag-bg);transform:translateY(-2px);}
.track-icon{font-size:30px;margin-bottom:14px;display:block;line-height:1;}
.track-name{font-size:16px;font-weight:800;color:var(--ink);letter-spacing:-.3px;margin-bottom:5px;}

.card-progress-bar{height:3px;background:var(--border);flex-shrink:0;}
.card-progress-fill{height:100%;background:var(--accent);transition:width .3s ease;}

.card-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:28px 24px;}

.flash-card{width:100%;max-width:700px;background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);}

.card-front{padding:32px 36px 28px;}
.card-diff{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}

.btn-reveal{padding:14px;background:var(--ink);color:var(--bg);border:none;border-radius:12px;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:inherit;transition:opacity .15s;}
.btn-reveal:hover{opacity:.85;}
.btn-know{padding:14px;background:none;color:var(--ink);border:1.5px solid var(--border);border-radius:12px;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:inherit;transition:border-color .15s;}
.btn-know:hover{border-color:var(--ink);}
.btn-mastered{padding:14px;background:var(--ink);color:var(--bg);border:none;border-radius:12px;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:inherit;transition:background .15s;}

.card-nav{width:100%;max-width:700px;display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding:0 2px;}

<script>
const TRACKS = [
{
  id:'profitability', icon:'📉', name:'Profitability',
  desc:'Revenue vs. cost decomposition, value chain diagnosis, and margin analysis.',
  time:20,
  cards:[
    {id:'pf1',diff:'Easy',title:'Profitability Framework',
     q:'How do you open a profitability case? What is the core framework structure?',
     a:`<div class="ans-point"><strong>Core structure:</strong> Profit = Revenue − Cost. Always split into these two branches first before drilling down.</div>
<div class="ans-point"><strong>Opening questions to ask:</strong> What product/service does the company offer? Is this a company-specific problem or industry-wide? What time period are we looking at? Are we talking EBITDA, PBT, or PAT?</div>
<div class="ans-point"><strong>Profit vs Profitability distinction:</strong> Profit = Revenue − Cost (absolute number). Profitability = Profit ÷ Revenue (a ratio/%). Always clarify which is declining.</div>
<div class="ans-point"><strong>Revenue side:</strong> Break down as Price × Volume. Then segment by product line, geography, or customer type to find where the decline sits.</div>
<div class="ans-point"><strong>Cost side:</strong> Split into Fixed and Variable. Then go to the value chain — raw materials, production, logistics, distribution, marketing, after-sales — to find the specific cost line that grew.</div>
<div class="ans-point"><strong>Interview rule:</strong> Never jump to cost cuts without ruling out a revenue problem first. The data should direct you, not an assumption.</div>`},
    {id:'pf2',diff:'Easy',title:'Revenue Decomposition',
     q:'How do you break down revenue and what are the most common traps?',
     a:`<div class="ans-point"><strong>Formula:</strong> Revenue = Price × Units Sold. For B2C: Revenue = Revenue per Customer × Number of Customers.</div>
<div class="ans-point"><strong>Demand-side (why units sold changed):</strong> Need (has customer need shifted?), Affordability (economic conditions, pricing), Accessibility (distribution reach), Availability (stock, supply), Awareness (marketing effectiveness), After-sales experience (NPS, churn).</div>
<div class="ans-point"><strong>Supply-side (why price changed):</strong> Procurement issues affecting margins, production constraints limiting volume, distribution gaps limiting reach.</div>
<div class="ans-point"><strong>Segmentation:</strong> Always segment by product mix, geography, and customer type. A flat top-line can hide a collapsing core product offset by a growing new one.</div>
<div class="ans-point"><strong>Trap 1 — Mix shift:</strong> If cheaper SKUs gain share, average revenue per unit falls even if prices are unchanged. That's a mix problem, not a pricing problem.</div>
<div class="ans-point"><strong>Trap 2 — Net vs Gross:</strong> Discounts, trade promotions, and returns reduce what hits the P&L. Always check net realisations, not list prices.</div>
<div class="ans-point"><strong>Trap 3 — Churn:</strong> Volume can grow while revenue is flat if high-value customers are leaving and being replaced by lower-value ones.</div>`},
    {id:'pf3',diff:'Medium',title:'Value Chain Cost Analysis',
     q:'What is the value chain cost framework and how do you use it to diagnose a cost problem?',
     a:`<div class="ans-point"><strong>Value chain stages (IIMA framework):</strong> R&D → Raw Material Procurement → Production → Storage & Transportation → Distribution → Marketing → After-Sales Support.</div>
<div class="ans-point"><strong>R&D:</strong> Equipment, tech, human capital, patents — one-time vs ongoing spend.</div>
<div class="ans-point"><strong>Raw Material Procurement:</strong> Cost of raw materials, supplier contracts, wastage/use efficiency.</div>
<div class="ans-point"><strong>Production:</strong> Machinery, factory rent, electricity, labour hours, technology, capacity utilisation, defect rate.</div>
<div class="ans-point"><strong>Storage & Transport:</strong> Route efficiency, vehicle costs, warehouse rent, electricity, inventory holding cost.</div>
<div class="ans-point"><strong>Distribution:</strong> Sales force, sales channels, training, incentive structure.</div>
<div class="ans-point"><strong>Marketing:</strong> Channel mix, spend per channel, digital vs physical conversion rates.</div>
<div class="ans-point"><strong>After-Sales:</strong> Repairs, spare parts, returns, customer service cost.</div>
<div class="ans-point"><strong>Cost classification:</strong> Also categorise as Fixed vs Variable, or Direct vs Indirect — whichever is most useful given the problem. Fixed cost issues require structural interventions; variable cost issues respond to sourcing or efficiency levers.</div>`},
    {id:'pf4',diff:'Easy',title:'Profit vs Profitability',
     q:'What is the difference between profit and profitability, and why does it matter in a case?',
     a:`<div class="ans-point"><strong>Profit</strong> = Revenue − Cost. An absolute number. Can grow even as profitability falls (eg. revenue doubles, costs triple).</div>
<div class="ans-point"><strong>Profitability</strong> = Profit ÷ Revenue. A ratio. Tells you efficiency of revenue conversion to profit.</div>
<div class="ans-point"><strong>Why the distinction matters:</strong> A company can show growing profits year-on-year but declining profitability — which means it's becoming less efficient at converting revenue to earnings. This often signals an underlying structural cost problem not visible at the absolute profit level.</div>
<div class="ans-point"><strong>Key metrics by level:</strong> Gross Margin = (Revenue − COGS) ÷ Revenue. EBITDA Margin = EBITDA ÷ Revenue. Net Margin = PAT ÷ Revenue.</div>
<div class="ans-point"><strong>Interview move:</strong> Always clarify upfront — "When the client says profitability is declining, are we looking at absolute profit falling, or the margin percentage compressing, or both?"</div>`},
    {id:'pf5',diff:'Medium',title:'Company vs Industry Problem',
     q:'How do you determine whether a profitability problem is company-specific or industry-wide?',
     a:`<div class="ans-point"><strong>Key diagnostic question:</strong> "Did competitors face the same decline in the same period?" If yes — industry-wide issue. If no — company-specific.</div>
<div class="ans-point"><strong>If industry-wide:</strong> The root cause is likely external — commodity inflation, regulatory change, demand shift, new technology disrupting the sector. The fix is usually wait-and-watch, pass-through pricing, or structural reorientation.</div>
<div class="ans-point"><strong>If company-specific:</strong> The company has underperformed its peers. Now diagnose why — pricing (did they discount more?), operations (higher cost structure?), mix (different customer/product portfolio?), or management decisions.</div>
<div class="ans-point"><strong>Framework: Company Revenue Growth = Category Growth + Market Share Δ.</strong> If the market grew 8% and the company grew 2%, they lost 6 percentage points of market share — a competitive problem, not a macro one.</div>
<div class="ans-point"><strong>PESTEL for external context:</strong> Political (regulations), Economic (inflation, rates), Social (demand shifts), Technological (disruption), Environmental (input costs), Legal (compliance costs).</div>
<div class="ans-point"><strong>Always ask:</strong> "Do you have data on how the industry or key competitors performed in the same period?"</div>`},
    {id:'pf6',diff:'Hard',title:'Fixed vs Variable Costs — Strategic Difference',
     q:'What is the strategic difference between fixed and variable costs, and how does it change the recommendation?',
     a:`<div class="ans-point"><strong>Fixed costs:</strong> Do not change with output in the short run. Rent, depreciation, base salaries, insurance. High fixed cost structures have operating leverage — when revenue grows, profits grow faster. When revenue falls, losses accelerate.</div>
<div class="ans-point"><strong>Variable costs:</strong> Scale with output. Raw materials, fuel, commissions, packaging. Manageable through sourcing, efficiency, or volume.</div>
<div class="ans-point"><strong>Semi-variable:</strong> Fixed up to a threshold, then variable. Overtime pay, utilities (base load fixed, incremental variable).</div>
<div class="ans-point"><strong>Why it matters for recommendations:</strong></div>
<div class="ans-point">• Variable cost problem → lever is sourcing (renegotiate contracts, find alternate suppliers), efficiency (reduce waste, improve yield), or volume (spread cost over more units).</div>
<div class="ans-point">• Fixed cost problem → lever is utilisation (fill existing capacity), restructuring (close facilities, reduce headcount), or revenue growth (spread fixed costs over a larger base).</div>
<div class="ans-point"><strong>Common interview trap:</strong> Recommending headcount cuts as the first answer is a red flag. It's the lazy answer. Always identify the root cause first — headcount may not even be the issue.</div>
<div class="ans-point"><strong>India example:</strong> A logistics company with high fuel (variable) and fleet depreciation (fixed) costs facing margin pressure — the fix for fuel is route optimisation and fuel hedging; the fix for depreciation is higher utilisation of the fleet, not cutting trucks.</div>`},
    {id:'pf7',diff:'Medium',title:'Benchmarking in Profitability',
     q:'How do you use benchmarking in a profitability case?',
     a:`<div class="ans-point"><strong>What benchmarking does:</strong> Converts "margins are low" from an opinion into a quantified gap with an evidence-based target.</div>
<div class="ans-point"><strong>Three types:</strong></div>
<div class="ans-point">• <strong>Internal benchmark:</strong> Same company, different time period. "EBITDA was 22% three years ago — now it's 15%. The 7-point gap needs explaining."</div>
<div class="ans-point">• <strong>Competitor benchmark:</strong> Same metric, competing companies. "Industry leader operates at 28% EBITDA; our client is at 19% — 9-point gap. What explains it?"</div>
<div class="ans-point">• <strong>Best-in-class benchmark:</strong> Cross-industry leader for a specific metric — used in operations (eg. Amazon's cost per fulfillment order as a warehouse efficiency benchmark).</div>
<div class="ans-point"><strong>What to look for in the gap:</strong> Once you establish the benchmark gap, ask "what is different?" Compare revenue mix, cost structure, operational model, and geography. Each difference is a potential explanation for the gap.</div>
<div class="ans-point"><strong>Interview move:</strong> "Before I go deeper, I'd like to establish a baseline — can you share how this metric compares to peers or to the company's own historical performance?"</div>`},
    {id:'pf8',diff:'Hard',title:'Unit Economics for Startups',
     q:'How does the profitability framework change for a loss-making startup or a new business unit?',
     a:`<div class="ans-point"><strong>The shift:</strong> For established firms, you ask "why did margin fall?" For startups, you ask "is there a path to profitability, and when?"</div>
<div class="ans-point"><strong>Key metrics (Unit Economics lens):</strong></div>
<div class="ans-point">• <strong>CAC (Customer Acquisition Cost):</strong> Total sales & marketing spend ÷ new customers acquired. How much to get one customer?</div>
<div class="ans-point">• <strong>LTV (Lifetime Value):</strong> Revenue per customer × gross margin × average customer lifespan. How much does one customer generate?</div>
<div class="ans-point">• <strong>LTV:CAC ratio:</strong> >3x is healthy. <1x means you're spending more to acquire customers than they're worth.</div>
<div class="ans-point">• <strong>Payback period:</strong> How many months until CAC is recovered from the margin generated?</div>
<div class="ans-point">• <strong>Contribution margin per order:</strong> Does each transaction cover its variable cost? If not, scale makes things worse, not better.</div>
<div class="ans-point"><strong>Break-even question:</strong> "At what volume does the business become EBITDA-positive?" This determines how much capital is needed and whether the business model is viable at all.</div>
<div class="ans-point"><strong>Red flag:</strong> If losses grow proportionally with revenue (or faster), unit economics are broken. Scaling is destructive, not value-creating.</div>`}
  ]
},
{
  id:'market-entry', icon:'🌐', name:'Market Entry',
  desc:'Assess market attractiveness, right to win, and optimal entry mode using the 4Cs.',
  time:16,
  cards:[
    {id:'me1',diff:'Easy',title:'Market Entry Framework',
     q:'What is the standard market entry framework and how do you open a market entry case?',
     a:`<div class="ans-point"><strong>Core question:</strong> Is it worthwhile to enter this market, and if yes, what is the best way to enter?</div>
<div class="ans-point"><strong>4C Framework (IIMA):</strong> Customer → Company → Competition → Context/Product.</div>
<div class="ans-point"><strong>Customer:</strong> Who are the target segments? What are their needs? What is the market size and growth? What is WTP (willingness to pay)?</div>
<div class="ans-point"><strong>Company:</strong> What is our product/service? What resources and key assets do we have? Is our value chain (procurement → production → distribution) feasible here? What does the break-even analysis look like?</div>
<div class="ans-point"><strong>Competition:</strong> How many competitors? What are their market shares? What are barriers to entry/exit? Are there regulations protecting incumbents? SWOT analysis of key players.</div>
<div class="ans-point"><strong>Context/Product:</strong> Is there a gap between customer expectations and available products? What macro factors (PESTEL) affect this market?</div>
<div class="ans-point"><strong>Opening move:</strong> "Always ask about the company's objective for entering this market before structuring. Then I'd evaluate across four areas: customer attractiveness, our competitive position, the competitive landscape, and external context."</div>
<div class="ans-point"><strong>Key rule:</strong> Market attractiveness ≠ right to win. A huge market is irrelevant if you can't build a defensible position.</div>`},
    {id:'me2',diff:'Medium',title:'Entry Mode Decision',
     q:'What are the different modes of market entry and how do you choose between them?',
     a:`<div class="ans-point"><strong>Four modes (IIMA framework):</strong></div>
<div class="ans-point">• <strong>Greenfield (Build own):</strong> Set up full operations from scratch. Highest control, highest cost, slowest. Use when: no suitable acquisition target, IP must be fully proprietary, long-term commitment justified.</div>
<div class="ans-point">• <strong>Acquisition (Brownfield):</strong> Buy an existing player. Fastest entry, immediate market share. Use when: target has irreplaceable assets (brand, distribution, talent), time-to-market is critical.</div>
<div class="ans-point">• <strong>Joint Venture:</strong> Share risk and capabilities with a local partner. Use when: local partner brings regulatory relationships, distribution, or market knowledge that takes years to build independently. Common in regulated sectors (insurance, defence, retail FDI).</div>
<div class="ans-point">• <strong>Outsourcing/Licensing/Franchising:</strong> Asset-light entry. Use when: brand or IP is the core differentiator, not operations. Limits capital exposure but limits control too.</div>
<div class="ans-point"><strong>Decision factors:</strong> Speed to market, capital availability, risk appetite, regulatory requirements, capability gap size.</div>
<div class="ans-point"><strong>Interview tip:</strong> Always state WHY you chose a mode — not just what it is. "Given the regulatory complexity and the 5-year timeline to build distribution independently, a JV with a local FMCG firm would be the fastest and lowest-risk path."</div>`},
    {id:'me3',diff:'Medium',title:'Market Sizing in Entry Cases',
     q:'How do you size a market in a market entry context (TAM / SAM / SOM)?',
     a:`<div class="ans-point"><strong>Three levels (IIMA framework):</strong></div>
<div class="ans-point">• <strong>TAM (Total Addressable Market):</strong> The entire market for the product/service if you had 100% share. Top-down: start from relevant population segment, apply penetration rate.</div>
<div class="ans-point">• <strong>SAM (Serviceable Addressable Market):</strong> TAM × Market Penetration — the portion you can realistically target given your geography, segment focus, and distribution capability.</div>
<div class="ans-point">• <strong>SOM (Serviceable Operable Market):</strong> SAM × Your Market Share — what you can realistically capture given competitive dynamics.</div>
<div class="ans-point"><strong>Approach choices:</strong> Top-down (start from macro data, funnel down) vs Bottom-up (unit × frequency × price, build up from individual transactions). Use whichever you have data for; triangulate with the other.</div>
<div class="ans-point"><strong>Sanity check always:</strong> After calculating, ask — does this number make intuitive sense? If your TAM implies every Indian spends ₹8,000/year on that product, is that plausible?</div>
<div class="ans-point"><strong>State assumptions explicitly:</strong> "I'm assuming 30% of urban adults would be target customers, at an average annual spend of ₹2,000." Push back if wrong — the interviewer will correct you and you update.</div>
<div class="ans-point"><strong>Economic test for entry:</strong> SOM × (Price − Variable Cost) − Fixed Cost > 0? If yes, the business is viable at realistic market share.</div>`},
    {id:'me4',diff:'Hard',title:'Right to Win',
     q:'What does "right to win" mean and how do you assess whether a company has it in a new market?',
     a:`<div class="ans-point"><strong>Definition:</strong> Right to win = the ability to build a sustainable competitive advantage against incumbents in the target market. Market attractiveness is necessary but not sufficient — you must also have a right to win.</div>
<div class="ans-point"><strong>Three questions to assess right to win:</strong></div>
<div class="ans-point">• <strong>Capability match:</strong> Do we have the technology, brand, supply chain, or talent that this market requires? Is there a critical capability gap?</div>
<div class="ans-point">• <strong>Transferable asset:</strong> Can we leverage something we already own — a customer base, distribution network, IP, or procurement scale — that gives us an advantage day one?</div>
<div class="ans-point">• <strong>Minimum efficient scale:</strong> Does the market require a certain market share to be profitable? If incumbents have 60% and you need 30% to break even, entry is structurally challenged unless you have a differentiated value proposition.</div>
<div class="ans-point"><strong>Strong right to win example:</strong> An FMCG company entering adjacent food categories using its existing kirana distribution and brand recognition — immediate distribution and brand trust transfer.</div>
<div class="ans-point"><strong>Weak right to win example:</strong> A telecom company entering healthcare — capital is available but clinical expertise, regulatory relationships, and patient trust take decades to build.</div>
<div class="ans-point"><strong>Red flag:</strong> "We have capital" is not a right to win. Capital delays the problem but doesn't solve it.</div>`},
    {id:'me5',diff:'Medium',title:'New Product Introduction',
     q:'How does the framework change when the case is about launching a new product (vs. entering a new geography)?',
     a:`<div class="ans-point"><strong>Focus shift:</strong> New product cases add a product viability question — is the product good enough to succeed? — on top of the standard market entry questions.</div>
<div class="ans-point"><strong>Three-stage framework (IIMA):</strong></div>
<div class="ans-point">• <strong>Stage 1 — Viability:</strong> Does the product meet an unmet customer need? Is there a gap between existing products and what customers want? Will customers pay for it?</div>
<div class="ans-point">• <strong>Stage 2 — Pricing & Target Market:</strong> What is the right price point? Who is the primary target segment? What is the channel strategy?</div>
<div class="ans-point">• <strong>Stage 3 — Value Chain Feasibility:</strong> Can we build the procurement → production → distribution chain? What are the fixed and variable costs? At what volume do we break even?</div>
<div class="ans-point"><strong>Financing question:</strong> Self-funded, debt-financed, or equity-financed? Each has different implications for risk and speed.</div>
<div class="ans-point"><strong>Opening clarifiers:</strong> "What exactly is the new product? Who is the target customer? Has the company launched similar products before? Which part of the value chain will we operate in — will we manufacture or outsource?"</div>`},
    {id:'me6',diff:'Hard',title:"Porter's Five Forces",
     q:"What are Porter's Five Forces and when do you apply them in a case?",
     a:`<div class="ans-point"><strong>Purpose:</strong> Assess structural profitability of an industry — why incumbents are profitable (or not) and whether that will persist.</div>
<div class="ans-point"><strong>Five Forces (IIMA detail):</strong></div>
<div class="ans-point">• <strong>Threat of New Entrants:</strong> Increases with low capital requirements, undifferentiated products, low brand value, no regulatory restrictions. Barriers protect incumbents.</div>
<div class="ans-point">• <strong>Bargaining Power of Suppliers:</strong> High when: few suppliers, low substitutes for their input, suppliers can integrate forward. Squeezes company margins from the cost side.</div>
<div class="ans-point">• <strong>Bargaining Power of Buyers:</strong> High when: many choices (low switching cost), standardised products, price-elastic demand, concentrated buyers (eg. a large retailer buying from many small manufacturers).</div>
<div class="ans-point">• <strong>Threat of Substitutes:</strong> High when: alternatives serve the same job-to-be-done at lower cost or better performance. Caps pricing power of the industry.</div>
<div class="ans-point">• <strong>Industry Rivalry:</strong> High when: many competitors, low differentiation, low switching costs, high exit barriers (stranded assets).</div>
<div class="ans-point"><strong>When to use:</strong> Market entry assessment (is the industry worth entering?), industry attractiveness analysis, understanding why margins are structurally low.</div>
<div class="ans-point"><strong>Limitation:</strong> Porter's is a static snapshot. Doesn't capture how platform economics, network effects, or technological disruption change competitive dynamics over time. Pair with a PESTEL or trend analysis.</div>`}
  ]
},
{
  id:'growth', icon:'📈', name:'Growth Strategy',
  desc:'Organic and inorganic growth levers, Ansoff Matrix, and revenue growth structuring.',
  time:14,
  cards:[
    {id:'gr1',diff:'Easy',title:'Growth Framework',
     q:'What is the core structure for a growth strategy case?',
     a:`<div class="ans-point"><strong>Core split:</strong> Organic Growth vs Inorganic Growth.</div>
<div class="ans-point"><strong>Organic Growth — Revenue per User:</strong></div>
<div class="ans-point">• Revenue per Transaction: Increase prices, upsell, cross-sell, bundle products.</div>
<div class="ans-point">• Number of Transactions per User: Loyalty programs, discounts, subscription models, usage triggers.</div>
<div class="ans-point"><strong>Organic Growth — Number of Users:</strong></div>
<div class="ans-point">• Existing markets, existing products: Better marketing, improved distribution, reduce churn.</div>
<div class="ans-point">• Existing markets, new products: Product development, line extension.</div>
<div class="ans-point">• New markets, existing products: Geographic expansion, new customer segments.</div>
<div class="ans-point">• New markets, new products: Diversification (highest risk).</div>
<div class="ans-point"><strong>Inorganic Growth:</strong> Joint ventures (capabilities + market access without full commitment) or Acquisitions (fastest way to buy customers, technology, or market share).</div>
<div class="ans-point"><strong>IIMA note:</strong> This framework is a comprehensive version of the Ansoff Matrix — think of Ansoff as the skeleton and the above as the muscle.</div>
<div class="ans-point"><strong>Opening move:</strong> "I'd like to understand the growth target first — what % YoY are we aiming for and what's the timeline? That shapes whether organic levers are sufficient or we need inorganic options too."</div>`},
    {id:'gr2',diff:'Easy',title:'Ansoff Matrix',
     q:'What is the Ansoff Matrix and how do you use it to structure growth options?',
     a:`<div class="ans-point"><strong>A 2×2 framework:</strong> Existing/New Products × Existing/New Markets.</div>
<div class="ans-point">• <strong>Market Penetration</strong> (existing product, existing market): Least risky. Increase marketing, reduce prices, improve distribution, acquire a competitor in the same market. Fastest path to growth if the market has headroom.</div>
<div class="ans-point">• <strong>Product Development</strong> (new product, existing market): Requires R&D investment. Leverages existing customer relationships with new offerings. Risk: new product may not succeed even with existing customers.</div>
<div class="ans-point">• <strong>Market Development</strong> (existing product, new market): Enter new geography or new customer segment. No R&D required. Risk: market may have different dynamics — distribution, regulation, or cultural preferences.</div>
<div class="ans-point">• <strong>Diversification</strong> (new product, new market): Highest risk. Requires both product development and market development simultaneously. Related diversification (synergies possible) is safer than unrelated.</div>
<div class="ans-point"><strong>Key insight:</strong> Most companies underinvest in Market Penetration and over-reach into Diversification. The safest and often largest opportunity is usually bottom-left.</div>
<div class="ans-point"><strong>In interviews:</strong> Use Ansoff to lay out the landscape of options, then recommend which quadrant(s) to pursue and why — based on capability, capital, and time horizon.</div>`},
    {id:'gr3',diff:'Medium',title:'Organic vs Inorganic Growth',
     q:'How do you decide between organic growth and inorganic growth (M&A)?',
     a:`<div class="ans-point"><strong>Organic — when to choose:</strong> Capabilities can be built in reasonable time. Market is not moving so fast that first-mover advantage is critical. Integration risk of M&A is higher than build cost. Company has capital but not the management bandwidth for post-merger integration.</div>
<div class="ans-point"><strong>Inorganic — when to choose:</strong> Target has irreplaceable assets (brand, tech, talent, regulatory approval) that would take too long to build. Time-to-market is critical — competitor is about to enter. The organic capability gap is structurally too large to close.</div>
<div class="ans-point"><strong>Decision test:</strong> Compare cost of building organically over 3–5 years vs. acquisition cost + integration cost. If inorganic is faster AND cheaper on a risk-adjusted basis, M&A wins.</div>
<div class="ans-point"><strong>India example:</strong> Reliance's ₹25,000Cr acquisition of Future Retail was faster than building equivalent kirana distribution from scratch — but integration challenges delayed the value realisation. Speed came with complexity.</div>
<div class="ans-point"><strong>Hybrid option:</strong> Joint venture — share risk and capabilities without a full acquisition. Allows a test-and-learn before committing to full ownership. Common where local market knowledge is critical.</div>`},
    {id:'gr4',diff:'Hard',title:'Unit Economics & Growth Viability',
     q:'How do unit economics determine whether a growth strategy is viable or destructive?',
     a:`<div class="ans-point"><strong>Growth is only valuable if it creates value at the unit level.</strong> Scaling a business with broken unit economics amplifies losses.</div>
<div class="ans-point"><strong>Core metrics:</strong></div>
<div class="ans-point">• <strong>CAC (Customer Acquisition Cost):</strong> Total sales & marketing spend ÷ new customers acquired in the period.</div>
<div class="ans-point">• <strong>LTV (Lifetime Value):</strong> Average revenue per customer × gross margin % × average customer lifespan. The total economic value of one customer.</div>
<div class="ans-point">• <strong>LTV:CAC ratio:</strong> >3x is a healthy business model. <1x means the company destroys value every time it acquires a customer — growth accelerates losses.</div>
<div class="ans-point">• <strong>Payback period:</strong> Months for CAC to be recovered from the contribution margin generated per customer.</div>
<div class="ans-point">• <strong>Contribution margin per order:</strong> Revenue per order − variable costs per order. Must be positive for any growth to be value-creating.</div>
<div class="ans-point"><strong>Red flag in a case:</strong> "GMV grew 4x but losses also grew 3x." → Unit economics aren't improving with scale. That's a structural problem — more growth makes it worse unless the underlying model changes (raise prices, reduce CAC, improve retention).</div>
<div class="ans-point"><strong>Growth recommendation test:</strong> Before recommending any growth lever, ask — at the new scale, are unit economics better or worse? If worse, the lever is destructive, not strategic.</div>`},
    {id:'gr5',diff:'Medium',title:'Revenue Growth Levers',
     q:'What are the specific revenue levers you can pull within each growth quadrant?',
     a:`<div class="ans-point"><strong>1. Cross-selling:</strong> Sell additional products to existing customers. Best when: strong customer trust, complementary product portfolio, multi-touchpoint relationship. Example: A bank cross-selling insurance to loan customers.</div>
<div class="ans-point"><strong>2. Upselling:</strong> Upgrade existing customers to a higher-value product or tier. Best when: clear premium product with visible value uplift. Example: SaaS companies moving users from Basic to Pro.</div>
<div class="ans-point"><strong>3. Bundling:</strong> Package multiple products at a combined price. Increases perceived value and average transaction size. Example: Telecom offering data + voice + OTT bundles.</div>
<div class="ans-point"><strong>4. Loyalty & retention programs:</strong> Increase purchase frequency and reduce churn. Most underutilised lever — retaining an existing customer is 5–7x cheaper than acquiring a new one.</div>
<div class="ans-point"><strong>5. Price increase:</strong> Feasible only with pricing power — differentiated product, low competition, inelastic demand. Must be careful of volume elasticity.</div>
<div class="ans-point"><strong>6. New channels:</strong> Add digital (D2C, marketplace), or expand physical reach (kirana, rural distributors, modern trade). Incremental distribution directly translates to incremental volume if product-market fit exists.</div>
<div class="ans-point"><strong>Interviewer wants:</strong> Prioritise the 2–3 levers with highest impact and speed. Don't list all six — choose and defend.</div>`}
  ]
},
{
  id:'pricing-ma', icon:'💰', name:'Pricing & M&A',
  desc:'Pricing strategy selection, value-based pricing, M&A framework, synergies, and due diligence.',
  time:18,
  cards:[
    {id:'pr1',diff:'Easy',title:'Three Pricing Strategies',
     q:'What are the three core pricing strategies and when do you apply each?',
     a:`<div class="ans-point"><strong>Framework (IIMA):</strong> The pricing approach depends on the nature of the product — new invention, modification to existing product, or similar to existing products.</div>
<div class="ans-point"><strong>1. Value-Based Pricing:</strong> Price = Customer's willingness to pay (WTP) based on the value delivered. Uses: opportunity cost of having no product, consumer surplus captured. Most profitable when defensible. Best for: new inventions, highly differentiated products, where competitive alternatives are weak.</div>
<div class="ans-point"><strong>2. Cost-Plus Pricing:</strong> Price = Fixed Costs + Variable Costs + Target Margin. Ensures cost recovery. Best for: commodity markets, government contracts, when cost certainty is required. Weakness: ignores customer WTP and competitive dynamics — leaves money on the table if value > cost.</div>
<div class="ans-point"><strong>3. Competitor-Based Pricing:</strong> Price relative to existing products/reference price in the market. Uses: existing product features, competitor pricing, WTP of current market. Best for: entering a market with established competitors, where customers comparison-shop. Risk: triggers price wars, margin compression for the whole industry.</div>
<div class="ans-point"><strong>Company objectives matter:</strong> If objective is market share → price aggressively (competitive-based, below reference). If objective is profitability → price on value. If objective is break-even → cost-plus with minimum margin.</div>
<div class="ans-point"><strong>Always clarify:</strong> "Before recommending a pricing approach, can you confirm the company's primary objective — market share capture, margin maximisation, or break-even recovery?"</div>`},
    {id:'pr2',diff:'Medium',title:'Value-Based Pricing',
     q:'How do you calculate a value-based price? Walk through the methodology.',
     a:`<div class="ans-point"><strong>Three-step method:</strong></div>
<div class="ans-point"><strong>Step 1 — Identify the reference point:</strong> What does the customer use today to solve this problem? What does that cost them (including all costs — price + time + effort + opportunity cost)?</div>
<div class="ans-point"><strong>Step 2 — Quantify the value delta:</strong> How much better is your product vs. the reference? Quantify in the customer's currency: money saved, revenue gained, time saved (converted to money), risk reduced (converted to expected cost avoided).</div>
<div class="ans-point"><strong>Step 3 — Capture a share of the delta:</strong> You set price between your cost (floor) and the customer's total value (ceiling). Typically, value is shared 50/50 — you get half, customer saves half vs. status quo. Adjust based on how many alternatives the customer has.</div>
<div class="ans-point"><strong>Example:</strong> A SaaS tool reduces a client's manual finance reconciliation by ₹10L/year. Current manual cost: ₹12L/year. Value created = ₹10L savings. Price ceiling = ₹10L (customer still saves vs. manual). Typical price: ₹5–6L (customer saves ₹4–5L, you earn ₹5–6L). Your cost to deliver: ₹1L. Huge margin possible if you can defend the value.</div>
<div class="ans-point"><strong>IIMA note:</strong> "WTP and opportunity cost may not be directly provided by the interviewer — develop creative proxies." Ask: "What does the customer currently pay for the alternative? What would it cost them if the product didn't exist?"</div>`},
    {id:'pr3',diff:'Hard',title:'Pricing a New Product',
     q:'How do you recommend a price for a product that has no direct comparables?',
     a:`<div class="ans-point"><strong>The challenge:</strong> No reference price exists, so competitor-based pricing doesn't work. You must build from value and cost.</div>
<div class="ans-point"><strong>Step 1 — Understand the customer's alternative:</strong> Even if there's no identical product, the customer has a status quo. What do they do today? What does that cost? This is your reference even if it's indirect.</div>
<div class="ans-point"><strong>Step 2 — Segment by WTP:</strong> Different customer segments will value the product differently. Don't set one price — consider tiered pricing (Basic / Pro / Enterprise) to capture consumer surplus across segments.</div>
<div class="ans-point"><strong>Step 3 — Penetration vs skimming decision:</strong> Penetration pricing (low initial price) to build market share fast → use when: network effects matter, scale drives down cost, market education is needed. Price skimming (high initial price) → use when: product is truly novel, early adopters have very high WTP, brand premium can be built.</div>
<div class="ans-point"><strong>Step 4 — Break-even validation:</strong> At the recommended price, what market share is needed to break even? Is that achievable given the competitive context?</div>
<div class="ans-point"><strong>India example:</strong> Jio's free data strategy (extreme penetration pricing) was designed to build a subscriber base that could then be monetised through devices, content, and commerce — the economics of the entry price only made sense in that long-term context.</div>`},
    {id:'ma1',diff:'Easy',title:'M&A Framework',
     q:'What is the core M&A framework and how do you structure an M&A case?',
     a:`<div class="ans-point"><strong>Core question:</strong> Does the acquisition create more value than it costs? Net Benefit = Value Added − Costs.</div>
<div class="ans-point"><strong>Financial dimension:</strong></div>
<div class="ans-point">• <strong>Valuation:</strong> What is the target company worth? Based on future cash flows it can generate (DCF) or market comparables (EV/EBITDA multiples).</div>
<div class="ans-point">• <strong>Synergies:</strong> Additional value from combining the two companies — revenue synergies + cost synergies.</div>
<div class="ans-point">• <strong>Acquisition price:</strong> What is being paid? The premium over intrinsic value justified by synergies?</div>
<div class="ans-point">• <strong>Integration costs:</strong> One-time costs of merging IT systems, operations, and organisational structure.</div>
<div class="ans-point"><strong>Non-financial dimension:</strong></div>
<div class="ans-point">• <strong>Strategic fit:</strong> Does the acquisition align with long-term growth strategy?</div>
<div class="ans-point">• <strong>Acquirer fit:</strong> Cultural fit (working norms, countries, entrepreneur vs corporate culture). Organisational fit (org structure, talent, skillset overlap). Strategy fit (long-term alignment).</div>
<div class="ans-point">• <strong>External risks:</strong> PESTEL analysis on macro factors — regulatory approval, political risk, economic conditions.</div>
<div class="ans-point"><strong>Opening:</strong> "I'd structure this across three areas: the strategic rationale (why this deal and why now), the financial case (does the math work including synergies), and integration feasibility (can we execute)."</div>`},
    {id:'ma2',diff:'Medium',title:'Types of Synergies',
     q:'What are the different types of synergies in M&A and how do you quantify them?',
     a:`<div class="ans-point"><strong>Operational Synergies — Revenue:</strong></div>
<div class="ans-point">• Selling more volume (access to new distribution or customer base).</div>
<div class="ans-point">• Higher pricing (combined brand justifies premium; reduced competition increases pricing power).</div>
<div class="ans-point">• Cross-sell opportunities (target's customers buy acquirer's products and vice versa).</div>
<div class="ans-point"><strong>Operational Synergies — Cost:</strong></div>
<div class="ans-point">• Economies of scale in procurement (combined buying volume → better rates).</div>
<div class="ans-point">• SG&A savings — eliminate duplicate functions (HR, Finance, Legal, IT teams).</div>
<div class="ans-point">• R&D rationalisation — one shared research function instead of two.</div>
<div class="ans-point">• Facility consolidation — close redundant factories, offices, distribution centres.</div>
<div class="ans-point"><strong>Financial Synergies:</strong> Tax savings (utilise target's tax losses), improved leverage ratio (combined entity can take more debt at better rates), financial shield benefits.</div>
<div class="ans-point"><strong>Critical rule:</strong> Cost synergies are more reliable and realise faster (12–24 months). Revenue synergies are speculative — customers may not cross-buy, distribution may not transfer. Discount revenue synergies heavily in your analysis (apply a 30–50% haircut).</div>
<div class="ans-point"><strong>Interview question to ask:</strong> "What portion of the synergy case is cost-based vs revenue-based, and what is the expected timeline for each?"</div>`},
    {id:'ma3',diff:'Medium',title:'Due Diligence Framework',
     q:'What is the due diligence framework and what are the key areas to investigate before an acquisition?',
     a:`<div class="ans-point"><strong>Purpose of DD:</strong> Verify what the seller is claiming. Discover risks that would change valuation or deal structure. Three phases: pre-diligence (investor profile, objectives) → diligence → post-diligence (valuation + transaction + exit options).</div>
<div class="ans-point"><strong>Market DD:</strong> Market sizing — is the opportunity as large as claimed? Future outlook — is the market growing or consolidating? Key demand drivers — are they structural or cyclical?</div>
<div class="ans-point"><strong>Competition DD:</strong> Benchmark the target vs competitors. How is it differentiated? Is that differentiation sustainable (does it have a moat)?</div>
<div class="ans-point"><strong>Business DD:</strong></div>
<div class="ans-point">• Financial: Quality of earnings (are profits recurring or one-time?), working capital adequacy, off-balance-sheet liabilities, capex trajectory.</div>
<div class="ans-point">• Non-financial: Operations quality, technology stack, team strength, workforce culture.</div>
<div class="ans-point"><strong>Customer DD:</strong> Segment customers behaviourally, psychographically, and firmographically. What is customer concentration (does 1 customer = 40% revenue — a major risk)? What are retention rates and NPS?</div>
<div class="ans-point"><strong>Deal-breakers in DD:</strong> Customer concentration >30% in one client. Ongoing regulatory investigations. IP disputes or unclear ownership. Key-man dependency (would the CEO leave post-acquisition?). Undisclosed related-party transactions.</div>`},
    {id:'ma4',diff:'Hard',title:'Valuation Methods',
     q:'What are the three main valuation methods and when do you use each?',
     a:`<div class="ans-point"><strong>Three methods — always triangulate:</strong></div>
<div class="ans-point"><strong>1. DCF (Discounted Cash Flow):</strong> Value = Present Value of future free cash flows, discounted at WACC. Use when: business is stable with predictable cash flows. Requires: revenue growth assumptions, EBITDA margin trajectory, capex, working capital, terminal growth rate, WACC. Most sensitive to discount rate — a small change in WACC moves the valuation significantly.</div>
<div class="ans-point"><strong>2. Comparable Companies (Comps):</strong> Value = EBITDA × industry multiple (from listed peer companies). Fast, market-grounded. Typical multiples: 6–12x EBITDA depending on sector. Risk: peers may not be truly comparable (different growth, margin profile, geography).</div>
<div class="ans-point"><strong>3. Precedent Transactions:</strong> Value = price paid in recent similar acquisitions. Includes an acquisition premium (typically 20–40% above market value). Best comparator for what a buyer actually pays. Use when: recent transactions in the sector exist.</div>
<div class="ans-point"><strong>Triangulation in a case:</strong> "I'd triangulate across all three — DCF for intrinsic value, comps for market context, and precedent transactions for what acquirers have actually paid. The fair acquisition price typically lands between comps and precedent transactions."</div>
<div class="ans-point"><strong>Key insight:</strong> If the synergy value > acquisition premium, the deal is value-accretive for the acquirer. If not, the acquirer overpays and value transfers to the seller's shareholders.</div>`}
  ]
},
{
  id:'strategy', icon:'♟️', name:'Strategic Tools',
  desc:'BCG Matrix, SWOT, PESTEL, Porter\'s Five Forces, Value Chain, and VRIO.',
  time:16,
  cards:[
    {id:'st1',diff:'Easy',title:'SWOT Analysis',
     q:'What is the SWOT framework and when do you use it in a consulting case?',
     a:`<div class="ans-point"><strong>SWOT is a 2×2:</strong> Internal (Strengths, Weaknesses) × External (Opportunities, Threats). Internal = controllable. External = environmental.</div>
<div class="ans-point"><strong>Strengths:</strong> Factors giving competitive advantage. Loyal customer base, strong brand, skilled employees, proprietary technology, strong distribution.</div>
<div class="ans-point"><strong>Weaknesses:</strong> Factors limiting performance. Lack of capital, high leverage, higher-than-market attrition, weaker brand in target segment, technology debt.</div>
<div class="ans-point"><strong>Opportunities:</strong> External factors favourably positioned. Favourable taxation shifts, falling raw material prices, new market trends, emerging technology that company can adopt, regulatory change opening new segments.</div>
<div class="ans-point"><strong>Threats:</strong> External factors that could harm. Increasing competition, new entrant with disruptive model, natural calamities, supply chain disruptions, upcoming regulations, limited labour supply.</div>
<div class="ans-point"><strong>When to use:</strong> To position a company at the start of a strategy case, to assess whether an M&A target has strategic fit, or to identify what risks to flag in a market entry recommendation.</div>
<div class="ans-point"><strong>Limitation:</strong> SWOT is descriptive, not diagnostic. It lists factors but doesn't prioritise or quantify them. Always follow with "so what" — which strength is the most valuable to leverage? Which threat is most immediate?</div>`},
    {id:'st2',diff:'Easy',title:'PESTEL Analysis',
     q:'What is PESTEL and how do you apply it in a case?',
     a:`<div class="ans-point"><strong>PESTEL = 6 external environment dimensions:</strong></div>
<div class="ans-point"><strong>P — Political:</strong> Government actions, elections, fiscal policy, corporate taxation, trade policy, government stability.</div>
<div class="ans-point"><strong>E — Economic:</strong> Inflation, interest rates, exchange rates, unemployment, GDP growth, consumer purchasing power.</div>
<div class="ans-point"><strong>S — Social:</strong> Demographic shifts, culture, beliefs, lifestyle trends, urbanisation, income distribution.</div>
<div class="ans-point"><strong>T — Technological:</strong> Level of tech adoption, automation, R&D investment, digital infrastructure, latest disruptions.</div>
<div class="ans-point"><strong>E — Environmental:</strong> Government environmental regulations, carbon footprint targets, risks for raw material availability, climate change impact on operations.</div>
<div class="ans-point"><strong>L — Legal:</strong> Intellectual property laws, industry-specific regulations, licences and permits required, compliance requirements.</div>
<div class="ans-point"><strong>When to use:</strong> Understanding the external context in a market entry case; identifying macro risks in an M&A; or as a structured way to assess industry context when asked "what external factors should the company consider?"</div>
<div class="ans-point"><strong>India context:</strong> Regulatory risk is often the most material PESTEL factor in India — DPCO in pharma, RBI guidelines in fintech, FDI limits in insurance, GST changes affecting working capital. Always flag the most material one, don't list all six equally.</div>`},
    {id:'st3',diff:'Medium',title:'BCG Matrix',
     q:'What is the BCG Matrix and how do you use it to advise a multi-business client?',
     a:`<div class="ans-point"><strong>2×2 Matrix:</strong> Market Growth Rate (vertical) × Relative Market Share (horizontal). Classifies business units into four types.</div>
<div class="ans-point"><strong>Stars</strong> (high growth, high share): Market leaders in growing markets. Invest heavily to maintain position. Can become Cash Cows when growth slows.</div>
<div class="ans-point"><strong>Cash Cows</strong> (low growth, high share): Mature markets, strong position. Generate cash with low reinvestment needed. "Milk" to fund Stars and Question Marks. Don't over-invest.</div>
<div class="ans-point"><strong>Question Marks</strong> (high growth, low share): Unclear potential. Need significant investment to become Stars. If the company can't win, better to exit early. Decision: invest or divest?</div>
<div class="ans-point"><strong>Dogs</strong> (low growth, low share): Weak position in declining market. Sustained cash flows but no growth potential. Liquidate or divest unless strategic reason to retain.</div>
<div class="ans-point"><strong>When to use:</strong> Multi-business portfolio analysis — which business units get investment, which get harvested, which get divested. Especially useful in a Growth or M&A context to assess portfolio composition.</div>
<div class="ans-point"><strong>Limitation:</strong> BCG Matrix is static and oversimplified. Market share and growth don't fully capture competitive position — a company with low share in a high-growth market might have strong technology that BCG doesn't capture. Always pair with qualitative strategic assessment.</div>`},
    {id:'st4',diff:'Medium',title:'Value Chain Analysis',
     q:'What is Porter\'s Value Chain and how do you use it to find cost or differentiation opportunities?',
     a:`<div class="ans-point"><strong>Purpose:</strong> Map all activities a company performs to deliver a product/service, and identify where cost advantages or differentiation opportunities exist.</div>
<div class="ans-point"><strong>Primary Activities (IIMA framework):</strong></div>
<div class="ans-point">• <strong>Product Development / R&D:</strong> Research capital, financing, human capital. IP and patents generated.</div>
<div class="ans-point">• <strong>Raw Material Procurement / Inbound Logistics:</strong> Optimal order quantity, supplier relationships, quality controls, wastage.</div>
<div class="ans-point">• <strong>Manufacturing / Operations:</strong> Machinery, human capital, technology, methodology. Capacity utilisation, defect rate.</div>
<div class="ans-point">• <strong>Warehousing & Transport (Outbound Logistics):</strong> Storage constraints, transport costs, inventory costs, route efficiency.</div>
<div class="ans-point">• <strong>Distribution:</strong> Channel selection, sales force, incentive structure, channel conversion rates.</div>
<div class="ans-point">• <strong>Retail & Marketing:</strong> Advertisements, brand awareness, human capital for sales.</div>
<div class="ans-point">• <strong>After-Sales Service:</strong> Repairs, customer service quality, returns policy, SLAs.</div>
<div class="ans-point"><strong>How to use:</strong> When diagnosing a cost problem — walk through each stage to find where costs are disproportionately high. When finding differentiation — which stage can the company invest in to create something competitors can't easily replicate?</div>`},
    {id:'st5',diff:'Hard',title:'VRIO Framework',
     q:'What is the VRIO framework and when do you use it?',
     a:`<div class="ans-point"><strong>VRIO = Valuable, Rare, Inimitable, Organized.</strong> Used to determine whether a resource or capability provides a sustained competitive advantage.</div>
<div class="ans-point"><strong>V — Valuable:</strong> Does this resource allow the company to exploit an opportunity or neutralise a threat? If not → Competitive Disadvantage.</div>
<div class="ans-point"><strong>R — Rare:</strong> Is this resource controlled by only a few competitors? If valuable but not rare → Competitive Parity (table stakes, not a differentiator).</div>
<div class="ans-point"><strong>I — Inimitable:</strong> Is it costly or difficult for competitors to imitate or substitute? If valuable + rare but easily copied → only Temporary Competitive Advantage.</div>
<div class="ans-point"><strong>O — Organized:</strong> Is the company organised to capture the value from this resource (right processes, structure, incentives)? If VRIO but poorly organised → Underutilized Competitive Advantage.</div>
<div class="ans-point"><strong>Outcome: Valuable + Rare + Inimitable + Organized = Sustained Competitive Advantage.</strong></div>
<div class="ans-point"><strong>When to use:</strong> Right to win analysis in market entry, strategy cases about competitive positioning, or when asked "what is the company's core advantage and is it defensible?"</div>
<div class="ans-point"><strong>Example:</strong> Reliance Jio's telecom infrastructure — Valuable (enables low-cost data), Rare (no other operator built greenfield at this scale simultaneously), Inimitable (₹1.5L Cr capex barrier), Organized (integrated with Jio apps, devices, content). → Sustained competitive advantage.</div>`},
    {id:'st6',diff:'Easy',title:'TAM / SAM / SOM',
     q:'How do you estimate TAM, SAM, and SOM and what is the strategic use of each?',
     a:`<div class="ans-point"><strong>TAM — Total Addressable Market:</strong> The entire market for the product/service. If you had 100% share. Use top-down approach: relevant population × penetration rate × price. Strategic use: sets the upper bound on opportunity size.</div>
<div class="ans-point"><strong>SAM — Serviceable Addressable Market:</strong> TAM × Market Penetration rate. The portion you can realistically target given geography, segment focus, and channel reach. Narrows TAM to your actual addressable space. Strategic use: defines the investment thesis — this is the realistic prize.</div>
<div class="ans-point"><strong>SOM — Serviceable Operable Market:</strong> SAM × Your Realistic Market Share. What you can actually capture given competitive dynamics. Strategic use: the number that drives financial projections and break-even analysis.</div>
<div class="ans-point"><strong>BCG Matrix connection:</strong> TAM/SAM/SOM supplements BCG — use TAM to assess if the growth opportunity is worth pursuing; use SOM to size the realistic prize that funds the investment case.</div>
<div class="ans-point"><strong>Top-down approach:</strong> Start from population → apply demographic filters → penetration rate → price. Fast, good for guesstimate-style questions.</div>
<div class="ans-point"><strong>Bottom-up approach:</strong> Unit × transactions per year × price per transaction. Builds from actual market behaviours. More accurate but data-intensive.</div>
<div class="ans-point"><strong>Always sanity check:</strong> Does the number feel right relative to known references? If your SOM implies 15% market share in Year 1 against established players, that's likely too aggressive.</div>`}
  ]
},
{
  id:'marketing', icon:'📣', name:'Marketing & General',
  desc:'5Cs, 4Ps, 4As, STP, MECE, issue trees, and structured recommendation delivery.',
  time:14,
  cards:[
    {id:'mk1',diff:'Easy',title:'5Cs of Marketing',
     q:'What are the 5Cs of Marketing and when do you use this framework?',
     a:`<div class="ans-point"><strong>A framework for understanding the marketing environment:</strong></div>
<div class="ans-point"><strong>Company:</strong> Who are you? Understand the company's products, channels, value chain, core capabilities, and current market position.</div>
<div class="ans-point"><strong>Customers:</strong> Who are you selling to? Understand customer segments, their needs and wants, WTP, buying behaviour, and how they currently solve their problem.</div>
<div class="ans-point"><strong>Competitors:</strong> Who is in your way? Understand other players, their strategies, pricing, market share, and how they're positioned relative to your product.</div>
<div class="ans-point"><strong>Collaborators:</strong> Who are you working with? Understand external vendors, suppliers, distribution partners, and co-marketing partners who enable your value delivery.</div>
<div class="ans-point"><strong>Context:</strong> What are current conditions? Use SWOT and PESTEL to understand the business climate, macro forces, and regulatory environment.</div>
<div class="ans-point"><strong>When to use:</strong> As an opening framework for any marketing strategy case, new product launch, or brand positioning question. Gives a 360° view before recommending tactics.</div>`},
    {id:'mk2',diff:'Easy',title:'4Ps of Marketing',
     q:'What are the 4Ps and how do you apply them in a case?',
     a:`<div class="ans-point"><strong>Product:</strong> The item catering to a customer need. Involves: product design, features, quality, range, branding, packaging. Key question: does the product meet the stated customer need better than alternatives?</div>
<div class="ans-point"><strong>Price:</strong> Amount charged for the product. Involves: pricing strategy (value-based / cost-plus / competitive), payment methods, discounts, allowances. Key question: is the price aligned with perceived value and competitive position?</div>
<div class="ans-point"><strong>Place:</strong> Channel of delivery. Involves: distribution channel selection, franchising, inventory management, transportation, last-mile logistics. Key question: is the product available where and when the customer wants to buy it?</div>
<div class="ans-point"><strong>Promotion:</strong> Marketing communications. Involves: channel mix (TV, digital, BTL), messaging, promotional offers, salesforce. Key question: is the target customer aware of the product and persuaded to buy?</div>
<div class="ans-point"><strong>When to use:</strong> When you've established market attractiveness and the company has decided to enter or grow — use 4Ps to design the go-to-market execution. Also use for diagnosing why a product isn't selling despite market demand.</div>`},
    {id:'mk3',diff:'Medium',title:'4As of Marketing',
     q:'What are the 4As of Marketing and how are they different from the 4Ps?',
     a:`<div class="ans-point"><strong>4As are customer-centric (vs 4Ps which are product/company-centric):</strong></div>
<div class="ans-point"><strong>Awareness:</strong> Do customers know the product exists? Two dimensions — product knowledge (enough to trigger purchase decision) and brand awareness (recognition, recall, top-of-mind).</div>
<div class="ans-point"><strong>Affordability:</strong> Can customers buy it? Economic affordability (do they have the financial resources?) and psychological affordability (are they willing to pay the price even if they can afford it?).</div>
<div class="ans-point"><strong>Accessibility:</strong> Can customers find and buy it? Customer availability (sufficient stock to meet demand) and customer convenience (ease of access — physical store proximity, delivery speed, online availability).</div>
<div class="ans-point"><strong>Acceptability:</strong> Will customers choose it? Functional acceptability (objective — product specs, performance, durability) and psychological acceptability (subjective — brand appeal, aesthetics, social signalling).</div>
<div class="ans-point"><strong>Diagnostic use:</strong> If a product exists, is priced right, but isn't selling — the 4As tell you where the breakdown is. No sales despite good awareness + affordability = acceptability problem (product doesn't resonate). No sales despite good product = awareness or accessibility problem.</div>`},
    {id:'mk4',diff:'Medium',title:'STP Marketing',
     q:'What is STP in marketing and how do you apply it in a case?',
     a:`<div class="ans-point"><strong>STP = Segmentation → Targeting → Positioning. A three-step process to define who you serve and how.</strong></div>
<div class="ans-point"><strong>Segmentation:</strong> Divide the market into distinct groups of customers based on shared characteristics. Methods: Demographic (age, income, gender), Geographic (region, urban/rural), Behavioural (usage frequency, brand loyalty, purchase occasion), Psychographic (lifestyle, values, attitudes).</div>
<div class="ans-point"><strong>Targeting:</strong> Select which segment(s) to focus marketing and distribution efforts on. Evaluate segments on: size, growth rate, profitability, company's ability to serve, competitive intensity. A smaller segment with less competition and high WTP is often better than the largest segment.</div>
<div class="ans-point"><strong>Positioning:</strong> Design the product and marketing mix to appeal to the target segment. What is the brand's unique value proposition? What single message should the customer take away? Positioning is the mental space you occupy — "For [target], [brand] is the [category] that [unique benefit] because [reason to believe]."</div>
<div class="ans-point"><strong>India example:</strong> Marico's Saffola — Segmented health-conscious urban adults. Targeted households where the primary grocery buyer cares about heart health. Positioned as "the healthy cooking oil" with a doctor-endorsed message. Avoided competing on price vs commodity oils.</div>`},
    {id:'mk5',diff:'Easy',title:'MECE Principle',
     q:'What does MECE mean and why is it fundamental to consulting problem-solving?',
     a:`<div class="ans-point"><strong>MECE = Mutually Exclusive, Collectively Exhaustive.</strong></div>
<div class="ans-point"><strong>Mutually Exclusive:</strong> Each category is distinct — no overlap, no double-counting. An issue can only go into one bucket.</div>
<div class="ans-point"><strong>Collectively Exhaustive:</strong> The categories together cover everything — no issue is left unaccounted for.</div>
<div class="ans-point"><strong>Why it matters:</strong> MECE thinking ensures your analysis is complete (you've covered all possibilities) and clean (you're not analysing the same thing twice under different names). Interviewers use it as a proxy for structured problem-solving ability.</div>
<div class="ans-point"><strong>Common MECE violations:</strong></div>
<div class="ans-point">• "Cost reduction" and "supplier renegotiation" as separate branches — supplier renegotiation is a subset of cost reduction. Not mutually exclusive.</div>
<div class="ans-point">• "Revenue from existing customers" and "revenue from SMEs" — an existing customer could be an SME. Overlapping categories.</div>
<div class="ans-point">• Listing 3 of 4 cost categories — misses "other" which might be material. Not collectively exhaustive.</div>
<div class="ans-point"><strong>Test:</strong> Can you place every data point into exactly one bucket? If yes — MECE. If a data point fits in two buckets, or doesn't fit in any — fix the structure.</div>`},
    {id:'mk6',diff:'Medium',title:'Hypothesis-Driven Approach',
     q:'What is a hypothesis-driven approach and why do consultants use it instead of exploring everything?',
     a:`<div class="ans-point"><strong>The approach:</strong> Rather than exploring all possibilities (boiling the ocean), start with a structured hypothesis: "I believe the problem is X, and here's my evidence. Here's how I'd test it."</div>
<div class="ans-point"><strong>Why consultants use it:</strong> Client time is expensive. Hypothesis-driven analysis focuses the team on the most likely answer and tests it quickly, rather than spending weeks mapping all possibilities equally.</div>
<div class="ans-point"><strong>Process:</strong></div>
<div class="ans-point">1. Form initial hypothesis based on case context, industry knowledge, and the data already given. "My hypothesis is that the margin decline is a cost problem, not a revenue problem — because the client mentioned stable volumes and the sector has seen commodity inflation."</div>
<div class="ans-point">2. Identify the 2–3 data points that would confirm or reject the hypothesis. "To test this, I'd look at raw material cost as a % of revenue vs. prior year, and compare to industry peers."</div>
<div class="ans-point">3. Test → if data supports → refine and deepen. If data rejects → state what it rules out and move to the next hypothesis.</div>
<div class="ans-point">4. Converge on the most data-supported answer.</div>
<div class="ans-point"><strong>Trap:</strong> Don't fall in love with your hypothesis. Good consultants update quickly when data contradicts them. "The data suggests I was wrong about X — which actually means the issue is more likely Y."</div>`},
    {id:'mk7',diff:'Easy',title:'Structuring a Recommendation',
     q:'How do you structure a final recommendation in a consulting case?',
     a:`<div class="ans-point"><strong>Use the Pyramid Principle — Answer First:</strong></div>
<div class="ans-point"><strong>1. Lead with the answer:</strong> "My recommendation is [specific action] because [primary reason]." State the conclusion first, not last. Interviewers hate when candidates build up to their answer — they already know the situation.</div>
<div class="ans-point"><strong>2. Three supporting pillars:</strong> Most important reason → second reason → third reason. Each pillar should be distinct (MECE) and backed by the analysis you've done.</div>
<div class="ans-point"><strong>3. Key risks and mitigations:</strong> "The main risk is [X]. We'd mitigate it by [specific action]." Shows you've thought beyond the recommendation.</div>
<div class="ans-point"><strong>4. Next steps:</strong> "As immediate next steps, I'd suggest [specific actions] in the next 30/60/90 days." Makes the recommendation actionable.</div>
<div class="ans-point"><strong>Example structure:</strong> "My recommendation is to enter the Indian EV market via a JV with a local manufacturer. Three reasons: local partner provides regulatory speed; JV limits upfront capital exposure; allows a market test before full commitment. Key risk: IP leakage — mitigated via contractual carve-outs and minority stake. Next steps: identify JV candidates in Q1, run commercial DD in Q2."</div>
<div class="ans-point"><strong>Critical rule:</strong> Never hedge with "it depends" as your final answer. Take a clear position, then qualify it. Consultants are paid to have a point of view.</div>`}
  ]
}
];

let currentTrack = null;
let currentIndex = 0;
let revealed = false;

function totalCards() { return TRACKS.reduce((s,t) => s + t.cards.length, 0); }

function renderTracks() {
  const grid = document.getElementById('tracks-grid');
  grid.innerHTML = TRACKS.map(t => {
    const mastered = t.cards.filter(c => CS.isMastered(c.id)).length;
    const pct = t.cards.length ? Math.round((mastered / t.cards.length) * 100) : 0;
    return `<div class="track-card" onclick="startTrack('${t.id}')">
      <span class="track-icon">${t.icon}</span>
      <div class="track-name">${t.name}</div>
      <div class="track-desc">${t.desc}</div>
      <div class="track-progress-label">${mastered} / ${t.cards.length} Mastered</div>
      <div class="track-progress-bar"><div class="track-progress-fill" style="width:${pct}%"></div></div>
      <div class="track-meta"><span>${t.cards.length} cards</span><span>~${t.time} min</span></div>
      <button class="track-btn">${mastered === t.cards.length && mastered > 0 ? 'Review Again →' : 'Start Learning →'}</button>
    </div>`;
  }).join('');
}

function startTrack(id) {
  currentTrack = TRACKS.find(t => t.id === id);
  currentIndex = 0;
  document.getElementById('view-tracks').style.display = 'none';
  document.getElementById('view-card').style.display = 'flex';
  showCard();
}

function exitDeck() {
  document.getElementById('view-card').style.display = 'none';
  document.getElementById('view-tracks').style.display = '';
  renderTracks();
}

function showCard() {
  if (!currentTrack) return;
  const cards = currentTrack.cards;
  const card = cards[currentIndex];
  revealed = false;

  // Topbar
  document.getElementById('cl-track').textContent = currentTrack.name.toUpperCase();
  document.getElementById('cl-counter').textContent = `Card ${String(currentIndex + 1).padStart(2,'0')} / ${cards.length}`;
  const mastCount = cards.filter(c => CS.isMastered(c.id)).length;
  document.getElementById('cl-mastered').textContent = `· ${mastCount} of ${cards.length} Mastered`;

  // Progress bar
  const pct = ((currentIndex + 1) / cards.length) * 100;
  document.getElementById('cl-progress').style.width = pct + '%';

  // Card content
  const diffClass = card.diff === 'Easy' ? 'diff-easy' : card.diff === 'Medium' ? 'diff-medium' : 'diff-hard';
  document.getElementById('cl-diff').innerHTML = `<span class="${diffClass}">${card.diff}</span>`;
  document.getElementById('cl-title').textContent = card.title;
  document.getElementById('cl-question').textContent = card.q;
  document.getElementById('cl-answer').innerHTML = card.a;

  // Star button
  const starBtn = document.getElementById('star-btn');
  starBtn.textContent = CS.isMastered('star_' + card.id) ? '★' : '☆';
  starBtn.classList.toggle('starred', CS.isMastered('star_' + card.id));

  // Hide answer
  document.getElementById('card-answer').style.display = 'none';

  // Action buttons
  setButtons('pre');

  // Nav buttons
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-skip').disabled = currentIndex === cards.length - 1;

  if (currentIndex === cards.length - 1) {
    document.getElementById('btn-skip').textContent = 'Finish';
    document.getElementById('btn-skip').disabled = false;
    document.getElementById('btn-skip').onclick = finishDeck;
  } else {
    document.getElementById('btn-skip').textContent = 'Skip →';
    document.getElementById('btn-skip').onclick = () => navCard(1);
  }
}

function setButtons(state) {
  const card = currentTrack.cards[currentIndex];
  const isMastered = CS.isMastered(card.id);
  const el = document.getElementById('card-actions');
  if (state === 'pre') {
    el.innerHTML = `<button class="btn-reveal" onclick="revealCard()">Reveal Answer</button>
      <button class="btn-know" onclick="markMastered()">✓ Already Know This</button>`;
  } else {
    el.innerHTML = `<button class="btn-mastered ${isMastered ? 'is-mastered' : ''}" onclick="markMastered()">${isMastered ? '✓ Mastered' : '✓ Mastered'}</button>
      <button class="btn-still" onclick="navCard(1)">📖 Still Learning</button>`;
  }
}

function revealCard() {
  revealed = true;
  document.getElementById('card-answer').style.display = 'block';
  setButtons('post');
}

function markMastered() {
  const card = currentTrack.cards[currentIndex];
  CS.toggleMastered(card.id);
  if (!revealed) revealCard();
  setButtons('post');
  const isMastered = CS.isMastered(card.id);
  document.querySelector('.btn-mastered').classList.toggle('is-mastered', isMastered);
  document.querySelector('.btn-mastered').textContent = isMastered ? '✓ Mastered' : '✓ Mark Mastered';
}

function toggleStar() {
  const card = currentTrack.cards[currentIndex];
  CS.toggleMastered('star_' + card.id);
  const starred = CS.isMastered('star_' + card.id);
  document.getElementById('star-btn').textContent = starred ? '★' : '☆';
  document.getElementById('star-btn').classList.toggle('starred', starred);
}

function navCard(dir) {
  currentIndex = Math.max(0, Math.min(currentTrack.cards.length - 1, currentIndex + dir));
  showCard();
}

function finishDeck() {
  const cards = currentTrack.cards;
  const mastered = cards.filter(c => CS.isMastered(c.id)).length;
  alert(`Track complete! You've mastered ${mastered} of ${cards.length} cards in ${currentTrack.name}.`);
  exitDeck();
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (!currentTrack) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') { e.preventDefault(); if (!revealed) revealCard(); else navCard(1); }
  if (e.key === 'm' || e.key === 'M') markMastered();
  if (e.key === 's' || e.key === 'S') toggleStar();
  if (e.key === 'ArrowRight') navCard(1);
  if (e.key === 'ArrowLeft') navCard(-1);
});

CS.syncUser();
renderTracks();
</script>
