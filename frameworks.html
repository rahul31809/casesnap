<script>
const FRAMEWORKS = [
  /* ── Profitability ── */
  {
    id:1, cat:'profitability', icon:'📉', iconClass:'icon-prof',
    name:'Profitability Framework',
    sub:'Core framework for any declining margin or loss-making client case.',
    tags:['EBITDA','Margins','Cost vs Revenue'],
    steps:['Clarify: EBITDA, PBT, or PAT? One-time or structural?','Split: Revenue vs. Cost — which is driving decline?','Revenue: Price × Volume — what moved and why?','Cost: Fixed vs. Variable — which category increased?','Benchmark against industry / historical trend','Identify root cause and recommend lever'],
    when:'<strong>Use when:</strong> Client margins are shrinking, a business unit is loss-making, or you\'re asked to "diagnose profitability."',
    example:'A cement manufacturer\'s EBITDA margin fell from 18% to 12%. Revenue grew 5% but COGS jumped 15% — coal and diesel costs spiked 40%. It was a variable cost problem, not a pricing failure. Fix: energy cost hedging + selective price pass-through.',
    mistakes:['Jumping into cost analysis before confirming whether revenue also declined — split first, drill second','Not asking if the drop is one-time (asset write-off) vs. structural (permanent margin compression) — changes the entire recommendation','Skipping the industry benchmark — a 12% EBITDA margin may be perfectly normal in that sector'],
    phrases:['"Before I structure, can I confirm — are we looking at EBITDA or PAT, and is this a recent drop or a multi-year trend?"','"I\'ll split into revenue and cost first, then go one level deeper on whichever is driving the decline."','"Is this company-wide, or is it isolated to one business unit or geography?"'],
    combos:['Revenue Decomposition','Cost Structure Analysis','BCG Growth-Share Matrix'],
    prompt:'A mid-size cement manufacturer\'s net margin fell from 14% to 8% over 2 years. The CEO believes it\'s a pricing problem. How do you approach this?',
    promptAnswer:'First, validate the CEO\'s hypothesis: has realised price per tonne actually fallen? If yes — is it market-driven (competition undercutting) or self-inflicted (discounting to hold volume)? If price is stable, the issue is costs. In cement, energy (coal/petcoke) and freight are 50–60% of total costs and are commodity-linked — check if that\'s the driver. Benchmark: did peer margins also compress, or is this company-specific? Likely answer: it\'s a cost problem masked as a pricing concern. The fix is energy hedging, procurement renegotiation, or efficiency — not a price hike that could erode volume.'
  },
  {
    id:2, cat:'profitability', icon:'💰', iconClass:'icon-prof',
    name:'Revenue Decomposition',
    sub:'Breaks revenue into levers — useful for diagnosing why top-line is stagnant or declining.',
    tags:['ARPU','Volume','Mix shift'],
    steps:['Revenue = Price × Quantity (or ARPU × Subscribers in B2C)','Segment revenue: product line, geography, customer type','Identify which segment is declining — mix shift or absolute drop?','Price driver: market pricing pressure vs. internal discounting?','Volume driver: demand weakness, churn, or distribution reach?','Cross-check with competitor revenue trends'],
    when:'<strong>Use when:</strong> Revenue is flat or declining despite a stable or growing market, or the client asks "why is our top-line not growing?"',
    example:'A B2C edtech platform\'s revenue was flat at ₹200Cr despite adding 50k new users. ARPU had fallen 30% — new cohorts chose the cheaper self-paced plan over live coaching. Volume grew, but mix shift to lower-value SKUs dragged overall revenue.',
    mistakes:['Saying "revenue fell" without segmenting — which product, geography, or cohort is driving it?','Confusing price and mix: if customers shift to cheaper SKUs, that is a mix problem, not a price problem — they look identical at the top line','Ignoring churn — net user growth ≠ revenue growth if existing high-value users are leaving'],
    phrases:['"Let me break revenue into price × volume, then segment by product line to find where the gap is."','"Has the customer mix changed — are we serving more lower-value segments than a year ago?"','"What is the churn rate and how does it compare to new customer acquisition cost?"'],
    combos:['Profitability Framework','Pricing Strategy Framework','Growth Levers Framework'],
    prompt:'A FMCG company\'s revenue grew 4% last year but they expected 12%. Walk through how you\'d diagnose this.',
    promptAnswer:'Price × Volume split first. If volume grew but revenue didn\'t track, check whether price realisation fell (trade discounts, promotions eroding net realisations) or if mix shifted to lower-value SKUs. If volume is the issue — check distribution reach (new markets under-penetrated?) vs. demand weakness in core markets. Then benchmark: did the category grow at 12% and they underperformed, or did the whole category slow? Underperforming a growing market is a distribution/brand problem; a category slowdown is a different beast — pricing, demand stimulation, or adjacency expansion.'
  },
  {
    id:3, cat:'profitability', icon:'🏗️', iconClass:'icon-prof',
    name:'Cost Structure Analysis',
    sub:'Diagnoses which cost buckets are driving margin erosion.',
    tags:['Fixed costs','Variable costs','Opex'],
    steps:['Split: Fixed vs. Variable costs','List cost categories: COGS, SG&A, R&D, D&A, interest','For each: has it grown in absolute terms? As % of revenue?','Identify one-time items vs. structural step-ups','Benchmark cost ratios vs. industry peers','Recommend cost takeout or restructuring lever'],
    when:'<strong>Use when:</strong> Revenue is stable but margins are falling — costs are clearly the culprit.',
    example:'A logistics company\'s margins fell despite flat revenue. Breakdown: fuel (40%, up 18% YoY), driver wages (25%, up 12% due to shortage), depreciation (stable). Two structural external drivers — not fixable by cutting headcount. Fix: rate revision clause in contracts + route optimisation to reduce fuel per delivery.',
    mistakes:['Not separating fixed from variable — the levers are completely different (fixed costs require structural changes; variable costs respond to volume or sourcing)','Treating all cost increases as one problem rather than isolating each driver and sizing it','Recommending headcount cuts first — it\'s the lazy answer and interviewers deduct marks for it'],
    phrases:['"I\'ll categorise costs into fixed and variable, then look at which bucket grew disproportionately relative to revenue."','"Has there been any step-change in the cost base — a new facility, an acquisition, or a regulatory compliance requirement?"','"Which single cost line has the most leverage — i.e., if we fixed it, would it move the needle on margins?"'],
    combos:['Profitability Framework','Operations Improvement (Lean)','Supply Chain Framework'],
    prompt:'A hospital chain\'s operating costs rose 22% while patient volumes grew only 8%. What\'s driving this and what do you do?',
    promptAnswer:'Split costs: staff (typically 50–60% in healthcare) — has headcount grown faster than volumes, or are there high-cost contract hires filling a talent gap? Facility costs: new hospitals require fixed cost absorption before utilisation scales, so this could be a temporary drag. Consumables (PPE, drugs, equipment) — supply chain inflation post-2022 is material. Benchmark cost/bed vs. comparable hospitals. Likely it\'s a combination of new capacity fixed cost drag and staffing premium. Fix: drive utilisation of new facilities faster, renegotiate supply contracts at consolidated volumes, review non-clinical outsourcing opportunities.'
  },

  /* ── Market Entry ── */
  {
    id:4, cat:'market-entry', icon:'🌐', iconClass:'icon-mktent',
    name:'4Cs Market Entry Framework',
    sub:'Evaluate whether and how to enter a new market across Customer, Competition, Company, and Context.',
    tags:['Market sizing','Competitive moat','Feasibility'],
    steps:['Customer: Who are they? Size, WTP, unmet needs?','Competition: Who plays? What is the moat? Is there room?','Company: Do we have capabilities, brand, capital to win?','Context: Regulatory, economic, or macro tailwinds/headwinds?','Mode of entry: Organic, JV, acquisition, or licensing?','Recommendation: Go / No-go with conditions'],
    when:'<strong>Use when:</strong> Client asks "should we enter market X?" or "how do we expand geographically or into a new segment?"',
    example:'Indian FMCG company evaluating Vietnam. Customer: 97M, young, urbanising, price-sensitive but brand-aware. Competition: local players dominant, 2 global MNCs with strong distribution. Company: strong EM playbook but no local brand equity. Entry mode: JV with local distributor. Verdict: conditional go — requires 3-year brand-building before going independent.',
    mistakes:['Spending all time on market sizing and skipping "can we win?" — market attractiveness ≠ right to win','Saying "enter" without specifying mode — organic build, JV, and acquisition have completely different risk/return profiles','Not addressing timing — is there a first-mover window closing, or is entry timing flexible?'],
    phrases:['"I want to evaluate this across four dimensions: customer attractiveness, competitive dynamics, our capabilities, and external context."','"Even if the market is attractive, we need to ask — do we have a right to win here, and can we build it?"','"What mode of entry makes sense given our capital position and risk appetite — greenfield, acquisition, or JV?"'],
    combos:['Porter\'s Five Forces','Market Sizing (TAM/SAM/SOM)','PESTLE Analysis'],
    prompt:'An Indian steel manufacturer is considering entering the EV battery component market. Should they?',
    promptAnswer:'Customer: OEMs are the primary buyers — limited counterparties, high volume, long-term contracts possible. Demand driven by EV adoption tailwind. Competition: currently dominated by Chinese and Korean suppliers with deep IP and cost advantages — high technical barrier. Company: steel metallurgy has some adjacency to battery casings and structural components, but the actual electrochemical know-how is entirely different — capability gap is real. Context: PLI scheme for ACC batteries creates a government incentive tailwind. Mode: technology JV or acquisition of a battery materials startup — don\'t build from scratch. Verdict: conditional go via partnership; independent entry would take 8–10 years and be prohibitively expensive.'
  },
  {
    id:5, cat:'market-entry', icon:'📏', iconClass:'icon-mktent',
    name:'Market Sizing (TAM/SAM/SOM)',
    sub:'Estimate market size using top-down or bottom-up approach.',
    tags:['TAM','SAM','Estimation'],
    steps:['Define: What exactly counts as the market?','Choose approach: Top-down (population funnel) or Bottom-up (unit × frequency × price)','TAM: Total addressable market — if you had 100% share','SAM: Serviceable addressable — realistic geography/segment','SOM: Your realistic capture given competitive dynamics','Sanity check: Does the number make intuitive sense?'],
    when:'<strong>Use when:</strong> Client needs to assess opportunity size before committing to a new market, or during guesstimate rounds.',
    example:'EV public charging stations in India. Demand-side: 5M EVs on road, 20% need public charging = 1M users. At 1 charger per 20 users = 50,000 stations needed. Current installed base: ~12,000. Gap is significant. SOM for a new entrant targeting Tier-1 highways: 5% in 3 years = ~2,500 stations.',
    mistakes:['Not clarifying what\'s being counted — revenue, units, users, or stations are all different markets','Using unreasonably precise numbers — 23.7% penetration is false precision; round to 1 sig fig and defend the logic','Skipping sanity check — if your answer is implausible relative to a known reference, stop and recalibrate'],
    phrases:['"Let me define what we\'re estimating precisely, then choose between top-down and bottom-up."','"I\'ll state my assumptions explicitly — please push back on any that seem unreasonable."','"As a sanity check: that implies X per capita per year — which feels [right / too high, so let me adjust]...."'],
    combos:['4Cs Market Entry Framework','Guesstimate Framework','Business Case / Investment Framework'],
    prompt:'Estimate the size of the corporate wellness programme market in India.',
    promptAnswer:'Demand-side: India has ~50M formal sector employees. Target segment: companies with 500+ employees in IT, BFSI, and manufacturing — roughly 15% of the formal workforce = 7.5M employees. Average corporate wellness spend at penetrated companies: ₹3,000–5,000 per employee per year. TAM = ₹22–37Bn. SAM = currently digitally serviceable = ~3M employees = ₹9–15Bn. Sanity check: the Indian corporate wellness market is commonly cited at ₹10–12Bn, which aligns with our SAM estimate. SOM for a new entrant with a digital platform: 3–5% in 3 years = ₹300–600Cr addressable opportunity.'
  },
  {
    id:6, cat:'market-entry', icon:'🛡️', iconClass:'icon-mktent',
    name:"Porter's Five Forces",
    sub:'Assess industry attractiveness before recommending entry.',
    tags:['Industry analysis','Competition','Barriers'],
    steps:['Competitive rivalry: How intense is existing competition?','Supplier power: Can suppliers squeeze margins?','Buyer power: Can customers demand lower prices?','Threat of substitutes: What else can buyers switch to?','Threat of new entrants: How easy is it to enter?','Synthesise: Is this an attractive industry? Where does pricing power sit?'],
    when:'<strong>Use when:</strong> Evaluating a new industry or explaining why margins in a sector are structurally low.',
    example:'Indian cement. Rivalry: high — top 5 control 60%, aggressive regional pricing. Supplier power: high — coal and limestone are commodity inputs. Buyer power: low for retail, moderate for large infra projects. Substitutes: low. New entrants: very low — capital-intensive, 3–5 year setup time. Verdict: attractive for incumbents, structurally difficult for new entrants.',
    mistakes:['Listing all five forces at equal weight — always identify which 2 forces dominate and what that implies for margin structure','Stopping at identification instead of linking forces to margin implications and a final verdict','Forgetting the synthesis: "Porter\'s says it\'s a tough industry — therefore the entry mode and margin expectation should be X"'],
    phrases:['"I\'ll run through the five forces and then synthesise which ones dominate and what that means for margins and entry viability."','"The key question Porter answers is: why do some industries structurally earn higher margins than others?"','"After mapping the forces, I\'ll conclude: is this an attractive industry to enter, and where in the value chain does pricing power sit?"'],
    combos:['4Cs Market Entry Framework','PESTLE Analysis','Value Chain Analysis'],
    prompt:'A large hospital chain is considering entering the diagnostics (pathology labs) business. Use Porter\'s to assess the industry.',
    promptAnswer:'Rivalry: high — Metropolis, SRL, Dr Lal Pathlab are dominant with aggressive price competition on commoditised basic tests. Supplier power: low — reagents and equipment from multiple vendors. Buyer power: high for walk-in consumers (price-sensitive, easy to switch for basic tests); low for referred/emergency diagnostics. Substitutes: moderate — in-hospital diagnostics, home testing kits growing. New entrants: moderate — capital needed but not prohibitive. Verdict: structurally competitive, thin-margin industry on standalone basis. However, the hospital chain has a critical advantage not captured in Porter\'s: captive patient referral flow from its own inpatient/OPD volumes fundamentally changes the competitive calculus — it bypasses the rivalry problem entirely.'
  },

  /* ── Growth ── */
  {
    id:7, cat:'growth', icon:'🚀', iconClass:'icon-growth',
    name:'Ansoff Matrix',
    sub:'Four growth strategies based on product and market combinations.',
    tags:['Product','Market','Diversification'],
    steps:['Market Penetration: Sell existing products to existing customers more','Market Development: Sell existing products to new geographies/segments','Product Development: Sell new products to existing customers','Diversification: New products for new markets (highest risk)','Evaluate feasibility for the client given risk appetite and capital','Recommend which strategy matches capability and constraints'],
    when:'<strong>Use when:</strong> Client wants to grow but hasn\'t specified how — use to structure the options space.',
    example:'A mid-market hotel chain. Penetration: loyalty programme to drive frequency. Development: expand same brand to Tier-2 cities. Product Dev: add branded serviced apartments. Diversification: enter airline lounges (furthest from core, highest risk). Recommendation: penetration + development first given capital constraints — diversification is Year 4+.',
    mistakes:['Treating all four quadrants as equally viable — risk increases dramatically going bottom-right; make that explicit','Not linking the recommendation to the client\'s risk appetite and capital position — a startup and a conglomerate have different Ansoff answers','Using it as a labelling exercise without prioritising — the output should be a ranked recommendation, not a 2×2 diagram'],
    phrases:['"The Ansoff Matrix gives us four options — I\'ll walk through each quickly, then recommend based on risk appetite."','"The safest lever is usually penetration — extracting more from what you already have before moving to new territory."','"Diversification carries the highest execution risk; I\'d recommend it only if organic options are exhausted or the strategic rationale is compelling."'],
    combos:['Growth Levers Framework','4Cs Market Entry Framework','BCG Growth-Share Matrix'],
    prompt:'A regional South Indian QSR chain wants to grow 3× in 5 years. Structure their options.',
    promptAnswer:'Penetration: increase same-store sales via loyalty app, extended breakfast hours, combo deals. Market Development: enter North India and Tier-2 cities — same menu, adapt spice levels, franchise model to limit capital risk. Product Development: launch a delivery-only dark kitchen menu; create a premium dine-in sub-brand. Diversification: FMCG packaged foods (frozen idli batter, chutneys) — adjacency to brand but different supply chain. Recommendation: penetration + development as the core growth engine in Years 1–3; product development once unit economics in new markets are proven. The 3× target is achievable via development alone if Tier-2 execution is tight — no need to take diversification risk.'
  },
  {
    id:8, cat:'growth', icon:'🔗', iconClass:'icon-growth',
    name:'Value Chain Analysis',
    sub:'Map activities to find where value is created and where there is room to capture more.',
    tags:['Primary activities','Support activities','Margin pools'],
    steps:['Map primary activities: Inbound → Ops → Outbound → Marketing → Service','Map support activities: HR, Tech, Procurement, Infrastructure','Identify where client is strong vs. weak vs. competitors','Find where margin pools are concentrated in the chain','Recommend: Invest in high-margin activities, outsource or fix weak links','Assess vertical integration or partnership opportunities'],
    when:'<strong>Use when:</strong> Client wants to identify competitive advantage or find efficiency and growth in its operations.',
    example:'A pharma company losing margin despite revenue growth. Value chain: R&D (strong IP) → Manufacturing (high cost vs. peers — inefficient batch processes) → Distribution (outsourced 3PL, margin drag) → Marketing (heavy field force cost). Margin pool sits in manufacturing and distribution. Fix: invest in continuous manufacturing; renegotiate 3PL rates at consolidated volume.',
    mistakes:['Mapping the chain without identifying where the margin pool actually sits — the point is to find value, not to describe activities','Treating support activities (like procurement) as overhead — in FMCG or pharma, procurement is a strategic moat worth protecting','Not comparing the client\'s chain to best-in-class peers — the gaps are where the improvement opportunity lives'],
    phrases:['"Let me map the primary and support activities first, then identify where value is being created, destroyed, or leaking vs. peers."','"The question isn\'t just what activities they do — it\'s where their relative advantage or disadvantage sits in the chain."','"Which parts of the chain should be core competency vs. outsourced — that is the strategic call."'],
    combos:['Operations Improvement (Lean)','Supply Chain Framework','M&A Rationale Framework'],
    prompt:'An Indian auto parts manufacturer wants to understand why its margins are lower than Chinese competitors. Structure the analysis.',
    promptAnswer:'Map the value chain: raw material procurement → stamping/machining → assembly → quality control → export logistics. Compare each step against Chinese peers. Procurement: Chinese players have scale-based supplier leverage on steel — cost gap here. Manufacturing: labour cost gap is narrowing; the real difference is automation penetration and machine utilisation rates. Quality: rework rates and rejection costs are often higher in India. Logistics: export from China to EU is cheaper per unit due to container volume. Likely finding: the gap is primarily in manufacturing productivity and scale, not any single easy lever. Fix requires capex in automation (PLI subsidy available for this), supplier base consolidation for better terms, and potentially co-loading shipments with other exporters for logistics efficiency.'
  },
  {
    id:9, cat:'growth', icon:'🎯', iconClass:'icon-growth',
    name:'Growth Levers Framework',
    sub:'Systematic approach to identifying organic and inorganic growth paths.',
    tags:['Organic','Inorganic','Adjacencies'],
    steps:['Organic — Revenue: pricing, volume, new segments, new geographies','Organic — Cost: efficiency, automation, procurement savings','Inorganic: M&A, partnerships, licensing, JVs','Evaluate each lever: impact vs. feasibility vs. time-to-value','Shortlist 2–3 high-priority levers with clear rationale','Outline sequenced roadmap with milestones'],
    when:'<strong>Use when:</strong> Client asks "how do we grow 2× in 3 years?" — gives structure to an open-ended growth question.',
    example:'A B2B SaaS company at ₹100Cr ARR asked for a 2× plan. Organic revenue: premium tier (current pricing undervalues the product), expand to SMB segment. Organic cost: automate onboarding to reduce CAC 30%. Inorganic: acquire a complementary analytics tool to defend against larger platforms. Priority: premium tier (90-day win) → SMB expansion (Year 1–2) → M&A (Year 3).',
    mistakes:['Jumping to M&A without exhausting organic options — M&A is the most expensive and highest-risk lever','Not ranking levers by time-to-value — interviewers expect you to sequence, not just list','Treating cost reduction as a "growth" lever — it improves margins but not top-line; keep them in separate buckets'],
    phrases:['"I\'ll structure growth into organic and inorganic; within organic, I\'ll split revenue and cost levers."','"Which lever can move the needle in 12 months vs. 3 years — that shapes the sequencing and resource allocation."','"What is the client\'s risk appetite? Are they open to dilution for an acquisition, or is this self-funded growth only?"'],
    combos:['Ansoff Matrix','M&A Rationale Framework','Profitability Framework'],
    prompt:'A private hospital chain with 8 hospitals wants to double EBITDA in 4 years without building new hospitals. What are the levers?',
    promptAnswer:'Revenue levers: occupancy improvement — if beds are underutilised, the fastest lever is growing referring-doctor relationships and corporate tie-ups. Service mix shift: push higher-margin specialties (oncology, cardiac, neuro) vs. general medicine. Medical tourism for premium elective procedures (international patients pay 2–5× domestic rates). Price realisation: are they underpriced vs. comparable hospitals on elective surgeries? Cost levers: consumable procurement at consolidated group volumes — a 15% saving on drugs/devices drops straight to EBITDA. Admin staffing ratio vs. peer benchmarks. Technology: reduce unnecessary repeat diagnostics, reduce readmission rates. Inorganic: acquire a diagnostics chain to capture downstream revenue without new hospital capex. Sequencing: price + procurement (Year 1), specialty mix + occupancy (Year 1–2), medical tourism + inorganic (Year 3–4).'
  },

  /* ── Pricing ── */
  {
    id:10, cat:'pricing', icon:'🏷️', iconClass:'icon-pricing',
    name:'Pricing Strategy Framework',
    sub:'Three lenses for setting or changing price — cost, competition, value.',
    tags:['Cost+','Value-based','Competitive'],
    steps:['Cost-plus: Floor price = Cost + Minimum acceptable margin','Competitive: What are peers charging? Can you command a premium?','Value-based: What is the customer\'s actual willingness to pay?','Segment customers: Different WTP → tiered pricing architecture?','Consider price elasticity: How will volume respond to a price change?','Recommend: Optimal price given strategy and market position'],
    when:'<strong>Use when:</strong> Client is launching a product, repricing, or facing margin compression. Common in PE due diligence and consumer cases.',
    example:'A new electric motorcycle launching at ₹1.5L. Cost-plus: manufacturing ₹95k + 30% margin = floor ₹1.23L. Competitive: Ather/Ola EV at ₹1.1–1.6L. Value-based: TCO over 5 years saves ₹1.2L vs. petrol equivalents. Recommendation: price at ₹1.45L — below premium competition, justified by TCO argument, well above floor.',
    mistakes:['Using only cost-plus — it ignores market context and customer WTP entirely, and often leaves money on the table','Setting price without segmenting customers — different segments have very different WTP and should be priced separately','Not thinking about pricing architecture — a single price vs. good/better/best tiers are fundamentally different strategies'],
    phrases:['"I\'ll approach this from three angles: the cost floor, the competitive ceiling, and what the customer actually values."','"The most sustainable price is where customer WTP overlaps with our margin requirement — let me find that zone."','"Is there an opportunity to tier pricing — capturing high-WTP segments without cannibalising the volume base?"'],
    combos:['Price Elasticity & Demand Analysis','Revenue Decomposition','Profitability Framework'],
    prompt:'A B2B software company is significantly underpriced vs. competitors but afraid to raise prices. How do you approach this?',
    promptAnswer:'First quantify the gap: current ARPU vs. peer benchmarks, and more importantly, what economic value does the software deliver to customers (cost saved, revenue enabled)? If delivered value >> current price, there is pricing headroom. Churn analysis: do customers currently switch on price signals, or on features and service quality? Low churn + high NPS = low price sensitivity. Approach: segment customers by size and use-case, run a controlled price test — pilot a 15% increase on a new cohort, measure churn and NPS delta over 60 days. If it holds, roll out to existing customers with a value narrative. Also test a premium tier with advanced features to capture the highest-WTP customers without forcing a blanket increase.'
  },
  {
    id:11, cat:'pricing', icon:'📊', iconClass:'icon-pricing',
    name:'Price Elasticity & Demand Analysis',
    sub:'Quantify how sensitive demand is to price changes.',
    tags:['WTP','Elasticity','Revenue optimisation'],
    steps:['Define: Is demand elastic (price-sensitive) or inelastic for this product?','Gather or estimate historical price-volume data','Calculate elasticity: % ΔQ / % ΔP','If elastic: price cuts may grow revenue; increases risk volume loss','If inelastic: pricing power exists — raise price to expand margin','Recommend optimal price using revenue = P × Q relationship'],
    when:'<strong>Use when:</strong> Client has a pricing power question — tolls, utilities, luxury goods, essential services, or subscription repricing.',
    example:'A toll road operator raises toll from ₹60 to ₹80 (+33%). Traffic falls from 50,000 to 45,000 vehicles/day (-10%). Elasticity = -0.3 (inelastic — captive route, no bypass). Revenue: old = ₹30L/day, new = ₹36L/day. Raising the price was the right call. Inelastic demand on a monopoly route is a pricing power goldmine.',
    mistakes:['Not distinguishing short-run vs. long-run elasticity — demand adjusts slowly, so a price hike looks fine initially but can erode volume over 12–18 months','Ignoring substitutes — elastic demand almost always requires viable alternatives to exist','Treating all customer segments as equally elastic — fleet operators and private car users respond differently to toll increases'],
    phrases:['"First I want to establish whether demand is elastic or inelastic here — that determines the direction of the recommendation entirely."','"Are there substitutes available? Elastic demand almost always requires a realistic alternative."','"Has the company tested price changes before? Historical price-volume data is the best signal we have."'],
    combos:['Pricing Strategy Framework','Revenue Decomposition'],
    prompt:'A cinema chain wants to raise weekend ticket prices by 20%. How do you evaluate whether this is a good idea?',
    promptAnswer:'Start with elasticity: weekend occupancy at multiplex chains runs 85%+, suggesting inelastic demand — people have committed to a specific out-of-home experience. OTT is the main substitute but serves a different occasion (home vs. social out). Historical check: have they raised prices before, and what happened to occupancy? Segment by format: IMAX/Dolby audience is the least price-sensitive, regular shows more sensitive. Recommendation: raise premium format prices (IMAX, Dolby) by 20% immediately — demand is effectively inelastic there. Test a 10% increase on regular shows first and track occupancy for 4 weeks before a full rollout. Avoid blanket pricing — segment the increase.'
  },

  /* ── M&A ── */
  {
    id:12, cat:'ma', icon:'🤝', iconClass:'icon-ma',
    name:'M&A Rationale Framework',
    sub:'Evaluate whether an acquisition makes strategic and financial sense.',
    tags:['Synergies','Strategic fit','Due diligence'],
    steps:['Strategic rationale: Why this target? Fill capability gap, buy growth, or neutralise a threat?','Market attractiveness: Is the target operating in a good industry?','Target assessment: Financials, competitive moat, management quality','Synergies: Revenue synergies (cross-sell, market access) + Cost synergies (shared overheads)','Integration risk: Cultural, systems, and operational complexity','Valuation: Does the deal price leave enough room for synergy upside?'],
    when:'<strong>Use when:</strong> Client is considering buying a company or being acquired — very common in Big 4 strategy and deals cases.',
    example:'HDFC Bank acquiring HDFC Ltd. Rationale: cross-sell home loans to 68M bank customers + capture insurance and asset management. Synergies: ₹5,000Cr revenue synergy + ₹1,200Cr cost synergy (overlapping branches). Integration risk: IT systems merger — highest execution risk. Valuation: 1.9× book — within range given synergy quantum.',
    mistakes:['Overestimating synergies — 60–70% of M&A deals underdeliver; acknowledge this risk explicitly','Not separating revenue synergies (uncertain, long-dated, 3–5 years) from cost synergies (more certain, 12–18 months)','Ignoring integration complexity — cultural and systems friction is where deals die after signing'],
    phrases:['"The first question is strategic rationale — why this target, why now, and why not build organically?"','"I\'d separate cost synergies (more certain, near-term) from revenue synergies (less certain, longer dated) — they require different confidence levels."','"Even if the deal is attractive on paper, integration execution risk can destroy the value — that\'s the hidden cost in most M&A."'],
    combos:['Due Diligence Framework','Business Case / Investment Framework','Value Chain Analysis'],
    prompt:'A large Indian IT services company is considering acquiring a mid-size US cybersecurity firm. Evaluate the deal.',
    promptAnswer:'Strategic rationale: IT services are commoditising; cybersecurity is high-growth, high-margin, and increasingly bundled with IT contracts — fills a genuine white space. Market: US enterprises spend $250B+ on cyber annually; IT company has existing CXO relationships to cross-sell through. Synergies: revenue — bundle cyber assessments and managed security with current IT contracts; cost — shared sales and G&A. Valuation: cyber firms trade at 5–8× revenue — expensive; need to model whether cross-sell synergies justify the premium over a 3–5 year horizon. Key risk: cyber talent will walk post-acquisition unless equity retention packages and cultural autonomy are preserved. This is the #1 deal-killer in cyber acquisitions and needs to be addressed before signing.'
  },
  {
    id:13, cat:'ma', icon:'🔍', iconClass:'icon-ma',
    name:'Due Diligence Framework',
    sub:'Structured checklist for evaluating a target before an acquisition.',
    tags:['Commercial DD','Financial DD','Operational DD'],
    steps:['Commercial DD: Market size, competition, customer concentration, churn','Financial DD: Revenue quality, cost structure, EBITDA bridge, working capital','Operational DD: Supply chain, IT systems, regulatory compliance','HR DD: Key man risk, cultural fit, attrition risk post-deal','Legal DD: Liabilities, IP ownership, contracts, ongoing litigation','Synthesise: Red flags vs. value creation thesis — proceed, reprice, or walk away'],
    when:'<strong>Use when:</strong> PE or strategic client is acquiring a business and needs to validate assumptions before signing.',
    example:'PE firm evaluating a QSR chain. Commercial: 60 outlets, 70% company-owned — franchise income is recurring. Financial: 18% EBITDA margin, but 3 outlets are loss-making and distorting the average. Legal: 2 active franchise disputes. Red flag: top 20 outlets = 65% of revenue — geographic concentration risk. Recommendation: proceed with adjusted valuation discounting loss-making outlets and provisioning for legal.',
    mistakes:['Treating DD as a checkbox exercise rather than a hypothesis-testing process — you\'re trying to find what could break the thesis','Missing quality of earnings — is EBITDA based on sustainable recurring revenue, or distorted by one-time items, aggressive accounting, or related-party transactions?','Ignoring key man risk — if the founder walks, does the business model still work?'],
    phrases:['"I\'d structure DD into four workstreams: commercial, financial, operational, and legal — then identify where the red flags are."','"Quality of earnings is the central financial DD question — is this EBITDA repeatable, and is the revenue recurring?"','"The goal of DD isn\'t to confirm the thesis — it\'s to find the things that could break it."'],
    combos:['M&A Rationale Framework','Business Case / Investment Framework','Profitability Framework'],
    prompt:'A PE client is buying a chain of 50 private schools in India. What are the top DD priorities?',
    promptAnswer:'Commercial: enrolment trend per school — is it growing or declining? Fee realisation per student vs. local peers. Teacher attrition rate (leading indicator of school quality and reputational risk). Financial: EBITDA per school — which schools are profitable vs. dragging? Working capital is favourable (school fees are advance-collected), so cash flow typically leads P&L. What is the capex requirement to maintain/upgrade facilities? Legal/regulatory: land ownership vs. lease (leasehold schools have higher operational risk); RTE compliance — 25% free seats mandate has a real cost that may be understated. Key man: is the operating model institutional, or does each school run on the founder/principal\'s personal brand? If the latter, post-acquisition performance is highly dependent on retention.'
  },

  /* ── Operations ── */
  {
    id:14, cat:'operations', icon:'⚙️', iconClass:'icon-ops',
    name:'Operations Improvement (Lean)',
    sub:'Identify and eliminate waste across a process using Lean principles.',
    tags:['Lean','Process efficiency','Waste'],
    steps:['Map the end-to-end process (value stream map)','Identify 7 wastes: Overproduction, Waiting, Transport, Motion, Overprocessing, Inventory, Defects','Quantify the cost or time impact of each waste','Prioritise: High-impact, low-complexity improvements first','Propose process redesign or automation where relevant','Define KPIs to track improvement (OEE, cycle time, first-pass yield)'],
    when:'<strong>Use when:</strong> Client has high costs or slow delivery and wants to improve operational efficiency.',
    example:'A packaging manufacturer\'s on-time delivery was 72% vs. industry benchmark of 92%. Value stream mapping revealed: machine setup time was 4 hours between SKU changes (overprocessing waste). Implementing SMED (Single Minute Exchange of Die) cut setup to 45 minutes, freed 18% of capacity, OTD improved to 89% within 6 months.',
    mistakes:['Jumping to automation before eliminating waste — automating a broken process makes it faster at being broken','Not quantifying the cost of each waste — "7 wastes" is a framework for finding the problem, not a conclusion','Underestimating change management — Lean fails in 70% of cases due to culture and adoption, not technical design'],
    phrases:['"Before proposing solutions, let me map the end-to-end process and find where time and cost are being lost."','"I\'d prioritise high-impact, low-complexity improvements first — quick wins build organisational momentum for the harder changes."','"Every process has a single binding constraint — finding and relieving that bottleneck should be the first priority."'],
    combos:['Supply Chain Framework','Root Cause Analysis (5 Whys)','Cost Structure Analysis'],
    prompt:'A government hospital\'s average patient discharge time is 6 hours — double the private sector benchmark. How would you improve this?',
    promptAnswer:'Map the discharge process: doctor sign-off → nursing clearance → pharmacy dispenses → billing clears → patient exits. Measure time spent at each step — the bottleneck is almost always billing or pharmacy (manual processes, separate queues). Apply Lean: run billing in parallel with the doctor\'s final round rather than sequentially; pre-pack standard discharge medication before the doctor sign-off; digitise discharge summaries to eliminate transcription lag. Quick win: dedicated discharge coordinators for each ward. Deeper fix: ERP integration between the billing, pharmacy, and nursing systems. Benchmark: a comparable private hospital likely has a 2.5-hour discharge because these steps run in parallel, not series.'
  },
  {
    id:15, cat:'operations', icon:'📦', iconClass:'icon-ops',
    name:'Supply Chain Framework',
    sub:'Diagnose disruptions or inefficiencies across the supply chain.',
    tags:['Procurement','Inventory','Logistics'],
    steps:['Map: Supplier → Manufacturing → Warehouse → Distribution → Customer','Identify bottleneck: Where is delay or cost concentrated?','Supplier risk: Concentration, lead time variability, quality','Inventory: Optimal levels, holding cost, stockout risk','Logistics: Last-mile efficiency, modal choice, 3PL vs. own fleet','Recommend: Dual sourcing, hub strategy, automation, vendor consolidation'],
    when:'<strong>Use when:</strong> Client faces supply disruption, rising logistics cost, or inventory build-up.',
    example:'A food company\'s raw material costs spiked 25% and delivery times increased 8 days. Root cause: single-source soy supplier in MP facing drought. Fix: dual-source from Rajasthan supplier + build 45-day safety stock. Long-term: quarterly demand signal sharing with top 3 suppliers to reduce their uncertainty premium.',
    mistakes:['Optimising purely for cost without considering resilience — low-cost supply chains are fragile, and the cost of a disruption often exceeds years of savings','Not identifying single points of failure — fragility is often concentrated in one supplier, one port, or one route','Recommending inventory buffers without first asking about working capital constraints — buffer stock has a cost'],
    phrases:['"I\'ll map the supply chain end-to-end and identify where the bottleneck or risk concentration is."','"Supply chains involve three tensions: cost, speed, and resilience — which is the priority, and what is the current trade-off?"','"Dual-sourcing reduces supplier risk but increases procurement complexity — the trade-off is worth making above a certain spend or criticality threshold."'],
    combos:['Operations Improvement (Lean)','Cost Structure Analysis','Value Chain Analysis'],
    prompt:'A mid-size pharma company\'s API supply is unreliable — batches arrive late 40% of the time. What do you do?',
    promptAnswer:'Diagnose first: is the 40% concentrated in one supplier or spread across all? Is it lead time variability (forecasting/planning issue) or actual production capacity constraints at the supplier? Is it concentrated in specific molecules or across all APIs? Root cause hypothesis: single-source Chinese supplier + no safety stock policy + reactive purchase orders triggered only when stock falls below minimum. Fix: calculate safety stock requirements for each critical API (demand × lead time standard deviation = buffer), establish dual-source for the top 5 APIs by revenue criticality, implement vendor-managed inventory for the highest-volume molecules. Strategic option: PLI scheme for API manufacturing makes backward integration (captive API unit) financially viable for highest-volume molecules — worth modelling.'
  },
  {
    id:16, cat:'operations', icon:'💻', iconClass:'icon-ops',
    name:'Digital Transformation Framework',
    sub:'Assess readiness and build a roadmap for a company\'s digitisation journey.',
    tags:['Technology','Automation','Change management'],
    steps:['Current state: What processes are manual or inefficient?','Opportunity sizing: Revenue uplift + cost reduction from digitisation','Technology stack: Build vs. buy vs. partner decision','Data readiness: Is data clean, centralised, and governed?','Change management: Org readiness, skills gap, culture','Roadmap: Quick wins (0–6M) → Core transformation (6–18M) → Scale'],
    when:'<strong>Use when:</strong> Tech consulting case or client wants to "digitise" — reframe the ask before jumping to solutions.',
    example:'A 150-store retail chain doing manual inventory management. Opportunity: 3% shrinkage reduction = ₹12Cr, 15% labour efficiency = ₹8Cr. Technology: RFID + ERP integration. Data gap: POS data clean but no centralised SKU master. Change management: store managers resistant (feared job loss). Roadmap: 5-store pilot → data clean-up → phased 18-month rollout.',
    mistakes:['Starting with technology choice without diagnosing the actual process problem — don\'t digitise waste, eliminate it first','Underestimating change management — most transformations fail on adoption, not technology; the hardest part is not building the system but getting people to use it','Not defining success metrics upfront — "digitise the business" is not measurable; "reduce order cycle time from 5 days to 1 day" is'],
    phrases:['"Before recommending technology, I want to understand what business problem we\'re actually solving and what good looks like."','"Technology is the last mile — data readiness and change management are what determine whether it succeeds."','"I\'d structure the roadmap in three phases: quick wins in 0–6 months to prove value, core build in 6–18 months, then scale."'],
    combos:['Operations Improvement (Lean)','Value Chain Analysis','Root Cause Analysis (5 Whys)'],
    prompt:'A ₹500Cr traditional textile manufacturer wants to "go digital." The CEO is excited about AI. How do you structure this conversation?',
    promptAnswer:'Reframe first: "go digital" is not a strategy — what is the business problem? Three most common in textiles: (1) demand forecasting failures causing overproduction and inventory write-offs, (2) customer ordering is still WhatsApp/phone based, (3) manufacturing downtime is untracked. Prioritise by impact × data readiness: if their ERP data is inconsistent, AI is premature — you need clean data before models. Quick wins: digital B2B ordering portal (replace phone/WhatsApp), real-time loom utilisation dashboard. Mid-term: demand forecasting model to reduce unsold inventory by 20–30%. AI layer: fabric defect detection using computer vision — high ROI if current rejection rates exceed 3%. Sequence: data infrastructure → automate basics → then AI, not the reverse.'
  },

  /* ── General ── */
  {
    id:17, cat:'general', icon:'🧠', iconClass:'icon-gen',
    name:'MECE Issue Tree',
    sub:'The foundation of structured consulting thinking — Mutually Exclusive, Collectively Exhaustive.',
    tags:['MECE','Structuring','Issue tree'],
    steps:['Define the problem precisely — avoid solving the wrong thing','Break into 2–4 branches that don\'t overlap (Mutually Exclusive)','Ensure branches together cover all possibilities (Collectively Exhaustive)','Each branch can be further split until hypotheses are testable','Test MECEness: "Can this go in two buckets?" → Not ME. "Is anything missing?" → Not CE','Use the issue tree as the backbone of every case structure'],
    when:'<strong>Use when:</strong> Starting any case — structuring the problem space is always the first 2 minutes.',
    example:'Problem: "Why is our app losing users?" MECE split: Acquisition (fewer new users coming in?) vs. Retention (existing users leaving faster?). If retention: Early churn (<7 days) vs. Late churn (>30 days). Early churn splits into: onboarding friction, value not perceived, wrong user segment acquired. Each branch is testable with data — no overlap, nothing missing.',
    mistakes:['Making branches that overlap — "customer service issues" and "poor user experience" are not MECE (service is a subset of experience)','Using a generic structure (3Cs, 4Ps) without adapting it to the specific problem — frameworks are starting points, not the answer','Not going deep enough — a 2-level tree is usually insufficient; drill until each leaf is directly testable with available data'],
    phrases:['"Let me structure this MECE — I\'ll make sure the branches don\'t overlap and together cover the full problem space."','"I\'d split this into [A] and [B] at the first level — does that feel exhaustive to you, or is there a third bucket?"','"Each branch should be directly testable — let me check that we have the data to confirm or reject each hypothesis."'],
    combos:['Hypothesis-Driven Approach','Pyramid Principle','Root Cause Analysis (5 Whys)'],
    prompt:'Build a MECE issue tree for: "A coffee chain\'s same-store sales are declining."',
    promptAnswer:'Level 1: Revenue (price × volume) — park cost for now since the question is about sales. Level 2, Revenue: Price (has realisation per ticket fallen?) vs. Volume (fewer transactions or smaller basket?). Level 2, Volume: Traffic (fewer customers entering) vs. Conversion (customers entering but not buying — rare in food; mention and set aside). Level 2, Traffic: Acquisition (new customers down — awareness, competitive entry nearby, weaker location) vs. Retention (regulars visiting less — loyalty eroding, product quality, pricing perception). Level 2, Basket: Fewer items per transaction vs. mix shift to cheaper items. This tree is fully MECE at every level, and every leaf is testable with POS and loyalty data.'
  },
  {
    id:18, cat:'general', icon:'📋', iconClass:'icon-gen',
    name:'Hypothesis-Driven Approach',
    sub:'Work from a leading hypothesis, then test and refine — the McKinsey way.',
    tags:['Hypothesis','Top-down','Pyramid principle'],
    steps:['Form an initial hypothesis from the data given at the start','State it clearly: "I believe the core issue is X because Y"','Design specific analyses to confirm or reject the hypothesis','Prune branches that data rules out; go deeper on those that hold','Update the hypothesis as new information emerges','Lead the final synthesis with the answer, not the analysis journey'],
    when:'<strong>Use when:</strong> You need to show structured thinking and avoid "boiling the ocean" in open-ended cases.',
    example:'An airline\'s load factor fell 8pp. Initial data: all routes affected, timing coincides with a fare restructuring. H1: the fare restructuring priced out price-sensitive leisure travellers. Test: compare load factor change on leisure vs. business routes. Result: leisure routes fell 14pp, business routes stable. H1 confirmed. Recommendation: restore promotional fares on leisure routes while maintaining business pricing.',
    mistakes:['Stating a hypothesis too vague to test — "the problem is competition" is an observation, not a hypothesis; "we lost share because a new entrant undercut price by 20% in metros" is testable','Abandoning a disproved hypothesis without replacing it — if H1 is wrong, explicitly say "H1 is disproved; new hypothesis is H2 because the data now points to..."','Running analyses without a prior hypothesis — you will drown in data and the interviewer will think you are fishing'],
    phrases:['"Based on the information given, my working hypothesis is [X] — I\'ll structure the analysis to test this specifically."','"I\'ll design analyses to confirm or reject this hypothesis, not to explore broadly."','"If this hypothesis is correct, we would expect to see [specific observable pattern] in the data — let me check."'],
    combos:['MECE Issue Tree','Pyramid Principle','Root Cause Analysis (5 Whys)'],
    prompt:'A retail bank\'s NPS dropped 12 points in Q3. Before seeing any data, what is your opening hypothesis and how do you test it?',
    promptAnswer:'A 12-point NPS drop is large and fast — it suggests a specific triggering event, not a gradual drift. H1: a recent product or policy change (fee introduction, digital feature removal, branch closure) created a concentrated wave of detractors. Test: survey verbatim analysis from Q3 — what specific complaints drove the low scores? Is the drop concentrated in one product (home loans, credit cards, mobile app) or across the board? H2: a service failure in a specific channel or geography. Test: NPS by channel (branch vs. digital vs. call centre) and by region. Always: state the hypothesis first, then design a targeted data pull to test it — never start with a data dump and work backwards.'
  },
  {
    id:19, cat:'general', icon:'🗺️', iconClass:'icon-gen',
    name:'SWOT Analysis',
    sub:'Quick situational audit — best used as input to strategy, not as the strategy itself.',
    tags:['Strengths','Weaknesses','Opportunities','Threats'],
    steps:['Strengths: Internal capabilities that give competitive advantage','Weaknesses: Internal gaps or vulnerabilities','Opportunities: External trends or gaps the client can exploit','Threats: External risks that could erode position','Match S→O (offensive moves) and W→T (defensive moves)','Translate findings into 2–3 specific strategic priorities'],
    when:'<strong>Use when:</strong> Asked for a strategic overview, or as a framing tool before diving into a growth or market entry case.',
    example:'Indian pharma company evaluating the US generics market. S: USFDA-approved facilities, R&D capability, 40% cost advantage. W: No US distribution network, zero brand recognition. O: US generic drug shortage, pricing reform increasing generics demand. T: USFDA warning letter risk (Ranbaxy precedent), intensifying Chinese price competition. SWOT-to-strategy: S+O → enter via contract manufacturing for US branded pharma first, build distribution later.',
    mistakes:['Treating SWOT as the end product — it is an input to strategy; always follow it with a "therefore..." recommendation','Not distinguishing internal (S/W) from external (O/T) factors — conflating them is a visible structuring error','Listing 8 strengths and 7 weaknesses with no prioritisation — pick the 2–3 most decisive and go deep on those'],
    phrases:['"I\'ll use SWOT as a diagnostic lens, then translate it into strategic priorities."','"The point isn\'t to list everything — it\'s to find the S-O matches (where do we go on offence?) and W-T matches (what do we need to defend?)"','"SWOT is the setup; the recommendation is where the value is."'],
    combos:['4Cs Market Entry Framework','PESTLE Analysis','Ansoff Matrix'],
    prompt:'Do a quick SWOT for an Indian public sector bank competing with fintech lenders in personal loans.',
    promptAnswer:'S: 600M+ existing customers (Jan Dhan), lowest cost of funds (deposit franchise), regulatory trust and brand familiarity. W: Legacy IT (core banking on 15–20 year-old systems), credit decisioning takes 2–7 days vs. fintechs\' 30 seconds, risk-averse culture that struggles to move fast. O: UPI and OCEN stack makes digital lending infrastructure accessible; MSME credit gap of ₹25T is largely unserved; government push for PSB digitisation with funding. T: Fintechs with superior UX, co-lending NBFC models with lower regulatory burden, customer loyalty eroding among under-35s. Strategic implication: don\'t try to out-fintech the fintechs — play to the strength (trusted relationship + existing customer data) by offering instant pre-approved personal loans to current account holders via mobile, underwritten by proprietary transaction data.'
  },
  {
    id:20, cat:'general', icon:'⚖️', iconClass:'icon-gen',
    name:'Decision Matrix (Prioritisation)',
    sub:'Score and rank initiatives by impact vs. feasibility.',
    tags:['Impact','Feasibility','Prioritisation'],
    steps:['List all initiatives or options on the table','Define scoring dimensions: impact (revenue/cost/risk) and feasibility (cost, time, complexity)','Score each option 1–3 on each dimension','Plot on a 2×2: High Impact / High Feasibility = quick wins','High Impact / Low Feasibility = strategic bets (resource carefully)','Low Impact = deprioritise regardless of ease'],
    when:'<strong>Use when:</strong> Client has many options and needs to decide where to focus — typically the final slide of most cases.',
    example:'Hospital chain evaluating 4 growth options: new specialty (Impact 3, Feasibility 2), medical tourism (3, 1), doctor referral programme (2, 3), price increase (1, 3). Quick wins: referral programme + price increase. Strategic bet: new specialty. Defer: medical tourism (requires 2–3 year build). Recommendation: start with quick wins to fund the strategic bet.',
    mistakes:['Equal-weighting all dimensions — in most cases, revenue impact should be weighted higher than ease of implementation','Building the matrix but not translating it into a clear recommendation — the matrix is a means, not the answer','Using it as a substitute for strategic thinking — it should make a difficult choice clearer, not replace the judgement'],
    phrases:['"Let me score each option on impact and feasibility, then plot to identify where we should focus first."','"Quick wins go first — they fund the strategic bets and build internal momentum."','"Even if something scores well on feasibility, I would only recommend it if the impact clears a minimum threshold."'],
    combos:['Growth Levers Framework','Business Case / Investment Framework','Ansoff Matrix'],
    prompt:'A startup has limited runway and 5 product features to build. How do you decide what to build first?',
    promptAnswer:'Score each feature on: revenue impact (0–3), customer retention impact (0–3), and build effort inverted (simpler = higher score). Plot on a 2×2 (impact vs. effort). High impact, low effort: build in the next sprint. High impact, high effort: schedule with dedicated resources. Low impact, low effort: opportunistic — only if bandwidth allows. Low impact, high effort: kill or defer indefinitely — this is the hard conversation. Additional override: is any feature on the critical path to a committed customer promise or a fundraising milestone? Those jump the queue regardless of the scoring, because the cost of missing them (churn or failed raise) exceeds the cost of delaying another feature.'
  },
  {
    id:21, cat:'general', icon:'🔺', iconClass:'icon-gen',
    name:'Pyramid Principle (Communication)',
    sub:'Structure your answer so the recommendation comes first, supported by evidence below.',
    tags:['Top-down','Storyline','SCQA'],
    steps:['Lead with the answer / recommendation — not the analysis','Support with 3 key arguments (the "pillars")','Each pillar is supported by data or analysis below it','Use SCQA: Situation → Complication → Question → Answer','In case interviews: state hypothesis → structure → findings → recommendation','Avoid the "journey" narrative — give the destination first'],
    when:'<strong>Use when:</strong> Structuring verbal synthesis in a case interview, or building a final recommendation slide.',
    example:'Question: "Should we enter Sri Lanka?" Wrong: "We looked at market size (large), then competition (fragmented), then capabilities... therefore yes." Right: "We recommend entering Sri Lanka via a JV with a local distributor. Three reasons: the market is attractively sized, competition is fragmented, and our manufacturing cost advantage translates directly. Here is the evidence."',
    mistakes:['Narrating the journey rather than leading with the answer — interviewers and clients call this "bottom-up" and it signals junior thinking','Having three pillars that do not all independently support the recommendation — each pillar should be load-bearing; remove any that are just context','Ending with "so in conclusion, as I said earlier..." — that is not a synthesis, it is a repetition'],
    phrases:['"My recommendation is [X]. There are three reasons: first... second... third... Let me walk through each."','"The situation is [S], the complication is [C], which raises the question of [Q]. Our answer is [A]."','"I\'ll lead with the answer and then support it — stop me if you\'d like to go deeper on any of the three pillars."'],
    combos:['MECE Issue Tree','Hypothesis-Driven Approach','Decision Matrix (Prioritisation)'],
    prompt:'Synthesise this in 30 seconds: A pharma company\'s profits fell 20%. You found revenue was stable, costs rose 18%, driven entirely by API price inflation from a single Chinese supplier.',
    promptAnswer:'"The profitability decline is entirely a cost problem — revenue is stable, so the P&L fix is on the cost side. A single-source Chinese API supplier drove an 18% cost increase. We recommend three actions: dual-source the top 5 APIs by spend within 6 months, build a 60-day safety stock buffer, and open a conversation with the largest supplier about a fixed-price annual contract. This directly eliminates the concentration risk and protects against future supply shocks. No changes are needed on the revenue side at this time."'
  },
  {
    id:22, cat:'general', icon:'📈', iconClass:'icon-gen',
    name:'BCG Growth-Share Matrix',
    sub:'Portfolio analysis tool — classify business units to allocate capital.',
    tags:['Portfolio','Stars','Cash cows'],
    steps:['Stars: High market share, high growth → invest to maintain','Cash Cows: High market share, low growth → harvest, fund others','Question Marks: Low share, high growth → selective investment','Dogs: Low share, low growth → divest or restructure','Map all BUs on the matrix using relative share and market growth rate','Recommend portfolio-level capital allocation strategy'],
    when:'<strong>Use when:</strong> Client is a conglomerate asking which businesses to invest in vs. divest.',
    example:'A conglomerate. Telecom: Cash Cow (high share, low growth). Renewables: Question Mark (low share, high growth — invest). Legacy Print Media: Dog (low share, low growth — divest). Digital Payments: Star (high share, high growth — protect moat). Recommendation: harvest Telecom to fund Renewables buildout, divest Print, protect Payments.',
    mistakes:['Taking the labels too literally — a "Dog" is not always worth divesting; it may have strategic linkages or be genuinely profitable in a low-growth but stable market','Using only current position — trajectories matter more than snapshots; a Question Mark moving fast toward leadership is different from one stalling','Forgetting "relative to whom" — market share is always relative to the largest competitor, not market size'],
    phrases:['"I\'ll map each BU on relative market share and market growth, then derive capital allocation implications."','"The portfolio should be self-funding — Cash Cows finance the Stars and selective Question Marks."','"The question isn\'t just where each BU sits today, but where it\'s heading and how fast."'],
    combos:['Ansoff Matrix','Growth Levers Framework','Decision Matrix (Prioritisation)'],
    prompt:'A large FMCG conglomerate is being pushed by investors to "unlock value". Use the BCG matrix to structure a portfolio review.',
    promptAnswer:'Map BUs: personal care (high share, moderate growth) = mature Star / Cash Cow. Packaged foods (moderate share, high growth) = Question Mark — need to decide: invest aggressively or exit. Agri commodities (low share, low growth) = Dog — capital-intensive, low-margin, strategically non-core. Premium skincare (low share, high growth) = Question Mark with high potential if premiumisation tailwind continues. Recommendation: divest agri commodities (non-core, frees up capital), invest in premium skincare (high-growth, rides the same brand equity as personal care), harvest personal care to fund the investments. This refocuses the portfolio on high-margin branded businesses — the kind of portfolio that attracts a higher earnings multiple from public market investors.'
  },
  {
    id:23, cat:'general', icon:'🌍', iconClass:'icon-gen',
    name:'PESTLE Analysis',
    sub:'Scan the external environment before a market entry or strategy recommendation.',
    tags:['Political','Economic','Tech','ESG'],
    steps:['Political: Regulatory risk, government stability, trade policy','Economic: GDP growth, inflation, interest rates, forex risk','Social: Demographics, consumer trends, urbanisation pace','Technological: Disruption risk, digitisation, infrastructure readiness','Legal: Compliance requirements, IP, labour law, sector regulation','Environmental: Climate risk, ESG pressure, carbon costs'],
    when:'<strong>Use when:</strong> Starting a market entry, country expansion, or M&A case — set the macro context before diving in.',
    example:'Green hydrogen in India. P: National Green Hydrogen Mission — ₹19,744Cr incentive. E: 4–5× more expensive than grey hydrogen now, but electrolyser costs falling 80% by 2030. S: Industrial adoption requires behaviour change. T: India behind EU on IP. L: New energy trading law needed. E: Critical for hard-to-abate sector decarbonisation. Verdict: 5-year window to build a position before cost parity changes the competitive landscape.',
    mistakes:['Listing factors without linking them to business implications — "political risk exists" is useless; "regulatory reversal risk means the client should structure the JV to exit within 5 years" is actionable','Going equal depth on all 6 letters — in practice 2–3 factors dominate; identify and weight them explicitly','Doing PESTLE in isolation — it should feed into a Porter\'s or 4Cs framework, not be the final answer'],
    phrases:['"Let me scan the macro environment across the six PESTLE dimensions, then flag the 2–3 factors that most determine whether this strategy succeeds."','"PESTLE sets the external context — it tells us what assumptions the business case is sitting on."','"Of these six, [X] and [Y] are the swing factors for this specific decision — let me go deeper there."'],
    combos:['4Cs Market Entry Framework',"Porter's Five Forces",'Business Case / Investment Framework'],
    prompt:'Your client is a European EV maker evaluating manufacturing in India. Run a quick PESTLE.',
    promptAnswer:'P: PLI scheme for EVs and Make in India incentives are well-aligned. Political stability is moderate — policy reversal risk is a real consideration for 10-year capex decisions. E: India labour cost is 30% of EU, meaningful advantage; but logistics costs are higher and rupee/EUR volatility creates P&L uncertainty. S: Domestic EV penetration is <5% of auto sales — export-oriented model is essential; don\'t bet on India domestic demand alone in the near term. T: EV component ecosystem is immature; critical minerals (lithium, cobalt) still imported; charging infrastructure lagging. L: Land acquisition is complex and time-consuming. EU emissions standards diverge from India — dual compliance adds cost. E: Renewable energy availability supports green manufacturing; EU Carbon Border Adjustment Mechanism (CBAM) may actually favour India-made EVs with clean energy certificates for export. Verdict: Attractive for an export-focused, PLI-incentivised plant — risky if the business case relies on domestic EV adoption timing.'
  },
  {
    id:24, cat:'general', icon:'📊', iconClass:'icon-gen',
    name:'Business Case / Investment Framework',
    sub:'Evaluate whether an investment or initiative is worth pursuing.',
    tags:['NPV','Payback','Risk-adjusted return'],
    steps:['Define the investment: Capex, timeline, strategic objective','Revenue case: Incremental revenue or cost savings generated','Cost case: Upfront + ongoing operating costs','Build simple P&L: Revenue − Costs over 5–10 years','Calculate NPV, IRR, or Payback period','Sensitivity: What if revenue is 20% lower? Is the case still viable?'],
    when:'<strong>Use when:</strong> Client is deciding whether to build a plant, launch a product, or make a large capital investment.',
    example:'New cement plant: ₹1,200Cr capex. Revenue: 3MT × ₹6,000/MT = ₹180Cr/year (ramped). EBITDA at 22% = ₹396Cr. NPV at 12% WACC = ₹820Cr. IRR = 19%. Payback = 7 years. Sensitivity: if realisations fall 10% → IRR = 14%, still above cost of capital. Decision: proceed.',
    mistakes:['Building a complex 50-row model without articulating the investment thesis in one sentence first — always lead with the conclusion','Using a single-point estimate without sensitivity analysis — the ranges matter more than the base case number','Ignoring terminal value or not justifying the discount rate chosen — these two inputs can swing NPV more than the operating assumptions'],
    phrases:['"The core question is whether the risk-adjusted return exceeds the cost of capital — let me build the case for that."','"I\'ll run a base case, then stress-test the two most sensitive assumptions — typically price and volume."','"NPV tells us absolute value creation; IRR tells us return on invested capital — both matter and they can occasionally conflict."'],
    combos:['M&A Rationale Framework','Pricing Strategy Framework','Decision Matrix (Prioritisation)'],
    prompt:'A solar developer is deciding whether to build a 100MW solar plant in Rajasthan for ₹400Cr. How do you evaluate this?',
    promptAnswer:'Revenue: 100MW × 22% capacity factor × 8,760 hrs × ₹2.8/unit PPA tariff = ₹54Cr/year. Opex: ₹5–6Cr/year (O&M, insurance, land lease). EBITDA = ~₹48Cr/year. Simple payback: 400 ÷ 48 = 8.3 years. IRR over 25-year life = ~13%. Benchmark: typical utility solar IRR in India is 11–14% — this is in-range. Key risks: DISCOM offtaker creditworthiness (payment delays are endemic — build a 90-day receivable buffer into working capital), merchant revenue tail after the 25-year PPA expires, and land acquisition timeline risk. Sensitivity: if PPA tariff falls to ₹2.5/unit (possible in competitive auction), IRR drops to ~10% — check if that still clears your WACC. Verdict: viable at ₹400Cr, conditional on DISCOM credit quality and timely COD.'
  },
  {
    id:25, cat:'general', icon:'🧩', iconClass:'icon-gen',
    name:'Root Cause Analysis (5 Whys)',
    sub:'Drill to the true underlying cause by asking "why" repeatedly.',
    tags:['Causal chain','Problem diagnosis','Ops'],
    steps:['State the observable problem precisely','Ask: Why is this happening? → Answer gives Level 1 cause','Ask Why again on Level 1 → Level 2 cause','Repeat 3–5 times until you hit a root cause you can actually act on','Validate: Does fixing this root cause prevent the surface symptom recurring?','Recommend the fix at root level, not symptom level'],
    when:'<strong>Use when:</strong> Operations or process cases where the problem is visible but the underlying cause is hidden.',
    example:'Manufacturing line\'s defect rate jumped from 1.2% to 4.8%. Why? → New raw material batch. Why different batch? → Primary supplier had a quality incident. Why wasn\'t it caught? → Incoming QC was skipped due to backlog. Why backlog? → Two QC inspectors on simultaneous leave. Why no cover? → No cross-training protocol existed. Root cause: absence of cross-training for critical QC roles — a people process gap, not a materials problem.',
    mistakes:['Stopping at the surface symptom and treating it as the cause — "the machine broke down" is an observation, not a root cause','Taking a wrong branch in the causal chain — always ask "why" about the most specific, precise observation','Confusing correlation with causation — B following A doesn\'t mean A caused B; test each causal link explicitly'],
    phrases:['"Let me trace the causal chain backwards from the symptom — I\'ll ask why until I reach something we can fix at the source."','"The root cause is the one where fixing it prevents recurrence — not just alleviates the immediate symptom."','"I want to avoid solving at the symptom level — that is expensive, temporary, and often masks a deeper structural issue."'],
    combos:['Operations Improvement (Lean)','MECE Issue Tree','Hypothesis-Driven Approach'],
    prompt:'A food delivery app\'s average delivery time increased from 32 to 44 minutes over 3 months. Use 5 Whys to find the root cause.',

  {

let activeTab = 'all';

function setTab(el) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  activeTab = el.dataset.cat;
  render();
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = FRAMEWORKS.filter(fw => {
    const matchCat = activeTab === 'all' || fw.cat === activeTab;
    const matchQ = !q || fw.name.toLowerCase().includes(q) || fw.sub.toLowerCase().includes(q) || fw.tags.some(t => t.toLowerCase().includes(q));
    return matchCat && matchQ;
  });

  document.getElementById('fwCount').textContent = filtered.length + ' framework' + (filtered.length !== 1 ? 's' : '');

  const content = document.getElementById('content');
  if (!filtered.length) {
    content.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><h3>No frameworks found</h3><p>Try a different search or category.</p></div>';
    return;
  }

  const catMeta = {
    'profitability': {label:'Profitability', order:1},
    'market-entry':  {label:'Market Entry', order:2},
    'growth':        {label:'Growth Strategy', order:3},
    'pricing':       {label:'Pricing', order:4},
    'ma':            {label:'M&A', order:5},
    'operations':    {label:'Operations', order:6},
    'general':       {label:'General Consulting', order:7}
  };

  const groups = {};
  filtered.forEach(fw => { if (!groups[fw.cat]) groups[fw.cat] = []; groups[fw.cat].push(fw); });
  const sortedCats = Object.keys(groups).sort((a, b) => (catMeta[a]?.order||9) - (catMeta[b]?.order||9));

  content.innerHTML = sortedCats.map(cat => {
    const fws = groups[cat];
    return `<div class="fw-section">
      <div class="fw-section-header">
        <span class="fw-section-label">${catMeta[cat]?.label||cat}</span>
        <span class="fw-section-count">${fws.length}</span>
      </div>
      <div class="fw-grid">
        ${fws.map(fw => `
          <div class="fw-card" id="fw-${fw.id}" onclick="toggleCard(${fw.id})">
            <div class="fw-card-top">
              <div class="fw-icon ${fw.iconClass}">${fw.icon}</div>
              <div class="fw-card-meta">
                <div class="fw-card-name">${fw.name}</div>
                <div class="fw-card-sub">${fw.sub}</div>
              </div>
              <div class="fw-chevron-wrap"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            </div>
            <div class="fw-tags">
              <span class="fw-mastered" id="mbadge-${fw.id}" style="${CS.isMastered(fw.id)?'':'display:none'}">✓ Mastered</span>
              ${fw.tags.map(t=>`<span class="fw-tag">${t}</span>`).join('')}
            </div>
            <div class="fw-expand-body">
              <div>
                <div class="fw-expand-label">Step-by-step</div>
                <div class="fw-steps-list">
                  ${fw.steps.map((s,i)=>`<div class="fw-step-item"><div class="fw-step-num">${i+1}</div><span>${s}</span></div>`).join('')}
                </div>
              </div>
              <div class="fw-when">${fw.when}</div>
              <div>
                <div class="fw-expand-label">Real-world example</div>
                <div class="fw-example">${fw.example}</div>
              </div>
              <div>
                <div class="fw-expand-label">Common mistakes</div>
                <ul class="fw-mistakes-list">
                  ${fw.mistakes.map(m=>`<li>${m}</li>`).join('')}
                </ul>
              </div>
              <div>
                <div class="fw-expand-label">Say this in the interview</div>
                <div class="fw-phrases-list">
                  ${fw.phrases.map(p=>`<div class="fw-phrase">${p}</div>`).join('')}
                </div>
              </div>
              <div>
                <div class="fw-expand-label">Works well with</div>
                <div class="fw-combo-tags">
                  ${fw.combos.map(c=>`<span class="fw-combo-tag">${c}</span>`).join('')}
                </div>
              </div>
              <div class="fw-prompt-box" onclick="event.stopPropagation()">
                <div class="fw-expand-label">Practice prompt</div>
                <div class="fw-prompt-q">${fw.prompt}</div>
                <button class="fw-prompt-reveal" onclick="revealPrompt(${fw.id},this)">Show model answer</button>
                <div class="fw-prompt-answer" id="pa-${fw.id}" style="display:none">${fw.promptAnswer}</div>
              </div>
              <button class="mastery-btn ${CS.isMastered(fw.id)?'mastery-btn-done':''}" id="mbtn-${fw.id}" onclick="event.stopPropagation();toggleMastery(${fw.id})">${CS.isMastered(fw.id)?'✓ Marked as Mastered':'Mark as Mastered'}</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id) {
  document.getElementById('fw-' + id).classList.toggle('expanded');
}

function revealPrompt(id, btn) {
  const ans = document.getElementById('pa-' + id);
  const showing = ans.style.display !== 'none';
  ans.style.display = showing ? 'none' : 'block';
  btn.textContent = showing ? 'Show model answer' : 'Hide answer';
}

function toggleMastery(id) {
  const now = CS.toggleMastered(id);
  const badge = document.getElementById('mbadge-' + id);
  const btn   = document.getElementById('mbtn-' + id);
  if (badge) badge.style.display = now ? '' : 'none';
  if (btn)   { btn.textContent = now ? '✓ Marked as Mastered' : 'Mark as Mastered'; btn.classList.toggle('mastery-btn-done', now); }
}

render();
document.getElementById('fw-streak-n').textContent = CS.getStreak();
CS.syncUser();
</script>
