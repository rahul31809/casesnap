<script>
const FRAMEWORKS = [
  /* ── Profitability ── */
  {
    id: 1, cat: 'profitability', icon: '📉', iconClass: 'icon-prof', mastered: false,
    name: 'Profitability Framework',
    sub: 'Core framework for any declining margin or loss-making client case.',
    tags: ['EBITDA', 'Margins', 'Cost vs Revenue'],
    steps: [
      'Clarify: EBITDA, PBT, or PAT? One-time or structural?',
      'Split: Revenue vs. Cost — which is driving decline?',
      'Revenue: Price × Volume — what moved and why?',
      'Cost: Fixed vs. Variable — which category increased?',
      'Benchmark against industry / historical trend',
      'Identify root cause and recommend lever'
    ],
    when: '<strong>Use when:</strong> Client margins are shrinking, a business unit is loss-making, or you\'re asked to "diagnose profitability."'
  },
  {
    id: 2, cat: 'profitability', icon: '💰', iconClass: 'icon-prof', mastered: false,
    name: 'Revenue Decomposition',
    sub: 'Breaks revenue into levers — useful for diagnosing why top-line is stagnant or declining.',
    tags: ['ARPU', 'Volume', 'Mix shift'],
    steps: [
      'Revenue = Price × Quantity (or ARPU × Subs in B2C)',
      'Segment revenue: product line, geography, customer type',
      'Identify which segment is declining — mix shift or absolute?',
      'Price driver: market pricing pressure vs. internal discounting?',
      'Volume driver: demand, churn, distribution reach?',
      'Cross-check with competitor revenue trends'
    ],
    when: '<strong>Use when:</strong> Revenue is flat or declining despite stable/growing market, or client asks "why is our top-line not growing?"'
  },
  {
    id: 3, cat: 'profitability', icon: '🏗️', iconClass: 'icon-prof', mastered: false,
    name: 'Cost Structure Analysis',
    sub: 'Diagnoses which cost buckets are driving margin erosion.',
    tags: ['Fixed costs', 'Variable costs', 'Opex'],
    steps: [
      'Split: Fixed vs. Variable costs',
      'List cost categories: COGS, SG&A, R&D, D&A, interest',
      'For each: has it grown in absolute terms? As % of revenue?',
      'Identify one-time items vs. structural step-ups',
      'Benchmark cost ratios vs. peers',
      'Recommend cost takeout or restructuring lever'
    ],
    when: '<strong>Use when:</strong> Revenue is stable but margins are falling — costs are clearly the culprit.'
  },

  /* ── Market Entry ── */
  {
    id: 4, cat: 'market-entry', icon: '🌐', iconClass: 'icon-mktent', mastered: false,
    name: '4Cs Market Entry Framework',
    sub: 'Evaluate whether and how to enter a new market across Customer, Competition, Company, and Context.',
    tags: ['Market sizing', 'Competitive moat', 'Feasibility'],
    steps: [
      'Customer: Who are they? Size, willingness to pay, unmet needs?',
      'Competition: Who plays? What is the moat? Is there room?',
      'Company: Do we have capabilities, brand, capital to win?',
      'Context: Regulatory, economic, or macro tailwinds/headwinds?',
      'Mode of entry: Organic build, JV, acquisition, licensing?',
      'Recommendation: Go / No-go with conditions'

    when: '<strong>Use when:</strong> Client asks "should we enter market X?" or "how do we expand geographically / into a new segment?"'

let activeTab = 'all';

function setTab(el) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  activeTab = el.dataset.cat;
  render();
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = FRAMEWORKS.filter(fw => {
    const matchCat = activeTab === 'all' || fw.cat === activeTab;
    const matchQ = !q || fw.name.toLowerCase().includes(q) || fw.sub.toLowerCase().includes(q) || fw.tags.some(t => t.toLowerCase().includes(q));
    return matchCat && matchQ;
  });

  document.getElementById('fwCount').textContent = filtered.length + ' framework' + (filtered.length !== 1 ? 's' : '');

  const content = document.getElementById('content');

  if (!filtered.length) {
    content.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><h3>No frameworks found</h3><p>Try a different search or category.</p></div>';
    return;
  }

  // Group by category
  const catMeta = {
    'profitability': { label: 'Profitability', order: 1 },
    'market-entry':  { label: 'Market Entry', order: 2 },
    'growth':        { label: 'Growth Strategy', order: 3 },
    'pricing':       { label: 'Pricing', order: 4 },
    'ma':            { label: 'M&A', order: 5 },
    'operations':    { label: 'Operations', order: 6 },
    'general':       { label: 'General Consulting', order: 7 }
  };

  const groups = {};
  filtered.forEach(fw => {
    if (!groups[fw.cat]) groups[fw.cat] = [];
    groups[fw.cat].push(fw);
  });

  const sortedCats = Object.keys(groups).sort((a, b) => (catMeta[a]?.order || 9) - (catMeta[b]?.order || 9));

  content.innerHTML = sortedCats.map(cat => {
    const fws = groups[cat];
    return `
      <div class="fw-section">
        <div class="fw-section-header">
          <span class="fw-section-label">${catMeta[cat]?.label || cat}</span>
          <span class="fw-section-count">${fws.length}</span>
        </div>
        <div class="fw-grid">
          ${fws.map(fw => `
            <div class="fw-card" id="fw-${fw.id}" onclick="toggleCard(${fw.id})">
              <div class="fw-card-top">
                <div class="fw-icon ${fw.iconClass}">${fw.icon}</div>
                <div class="fw-card-meta">
                  <div class="fw-card-name">${fw.name}</div>
                  <div class="fw-card-sub">${fw.sub}</div>
                </div>
                <div class="fw-chevron-wrap">
                  <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
              </div>
              <div class="fw-tags">
                ${CS.isMastered(fw.id) ? '<span class="fw-mastered" id="mbadge-'+fw.id+'">✓ Mastered</span>' : '<span class="fw-mastered" id="mbadge-'+fw.id+'" style="display:none">✓ Mastered</span>'}
                ${fw.tags.map(t => `<span class="fw-tag">${t}</span>`).join('')}
              </div>
              <div class="fw-expand-body">
                <div>
                  <div class="fw-expand-label">Step-by-step</div>
                  <div class="fw-steps-list">
                    ${fw.steps.map((s, i) => `<div class="fw-step-item"><div class="fw-step-num">${i+1}</div><span>${s}</span></div>`).join('')}
                  </div>
                </div>
                <div class="fw-when">${fw.when}</div>
                <button class="mastery-btn" id="mbtn-${fw.id}" onclick="event.stopPropagation();toggleMastery(${fw.id})">${CS.isMastered(fw.id) ? '✓ Marked as Mastered' : 'Mark as Mastered'}</button>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function toggleCard(id) {
  const card = document.getElementById('fw-' + id);
  card.classList.toggle('expanded');
}

function toggleMastery(id) {
  const now = CS.toggleMastered(id);
  const badge = document.getElementById('mbadge-' + id);
  const btn   = document.getElementById('mbtn-' + id);
  if (badge) badge.style.display = now ? '' : 'none';
  if (btn)   btn.textContent = now ? '✓ Marked as Mastered' : 'Mark as Mastered';
  if (btn)   btn.classList.toggle('mastery-btn-done', now);
}

render();
document.getElementById('fw-streak-n').textContent = CS.getStreak();
CS.syncUser();
</script>
