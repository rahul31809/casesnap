<title>CaseSnap — Frameworks</title>
<style>
/* ── Tokens ─────────────────────────────────────────────────────────── */
:root {
  --bg:          #F8F4EC;
  --surface:     #FFFFFF;
  --surface2:    #F2EDE4;
  --ink:         #1A150D;
  --ink-muted:   #6E5A3C;
  --accent:      #B5580A;
  --accent-h:    #CC6610;
  --accent-text: #FFFFFF;
  --border:      #DDD0B8;
  --tag-bg:      rgba(181,88,10,.08);
  --tag-bd:      rgba(181,88,10,.18);
  --shadow:      0 2px 20px rgba(181,88,10,.10);
  --sb-w:        214px;

  --sb-ink:      #D8C8A8;

}
@media (prefers-color-scheme: dark) { :root {
  --bg:          #0F0B06;
  --surface:     #1A1208;
  --surface2:    #201608;
  --ink:         #F0E8D8;
  --ink-muted:   #A0845A;
  --accent:      #F09830;
  --accent-h:    #F5AA48;
  --accent-text: #100C04;
  --border:      #2E2214;
  --tag-bg:      rgba(240,152,48,.10);
  --tag-bd:      rgba(240,152,48,.22);
  --shadow:      0 2px 36px rgba(0,0,0,.55);
  --sb-bg:       #100C04;
  --sb-ink:      #D8C8A8;
  --sb-muted:    #7A6040;
  --sb-hover:    rgba(240,152,48,.07);
  --sb-active:   rgba(240,152,48,.13);
}}
:root[data-theme="dark"] {
  --bg:#0F0B06;--surface:#1A1208;--surface2:#201608;--ink:#F0E8D8;--ink-muted:#A0845A;
  --accent:#F09830;--accent-h:#F5AA48;--accent-text:#100C04;--border:#2E2214;
  --tag-bg:rgba(240,152,48,.10);--tag-bd:rgba(240,152,48,.22);--shadow:0 2px 36px rgba(0,0,0,.55);
  --sb-bg:#100C04;--sb-ink:#D8C8A8;--sb-muted:#7A6040;--sb-hover:rgba(240,152,48,.07);--sb-active:rgba(240,152,48,.13);
}
:root[data-theme="light"] {
  --bg:#F8F4EC;--surface:#FFFFFF;--surface2:#F2EDE4;--ink:#1A150D;--ink-muted:#6E5A3C;
  --accent:#B5580A;--accent-h:#CC6610;--accent-text:#FFFFFF;--border:#DDD0B8;
  --tag-bg:rgba(181,88,10,.08);--tag-bd:rgba(181,88,10,.18);--shadow:0 2px 20px rgba(181,88,10,.10);
  --sb-bg:#1A1208;--sb-ink:#D8C8A8;--sb-muted:#8A7458;--sb-hover:rgba(240,152,48,.09);--sb-active:rgba(240,152,48,.14);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);height:100dvh;display:flex;overflow:hidden;}

/* ── Sidebar ─────────────────────────────────────────────────────────── */
.sidebar{width:var(--sb-w);flex-shrink:0;background:var(--sb-bg);display:flex;flex-direction:column;padding:20px 0 16px;overflow:hidden;}
.sb-logo{display:flex;align-items:center;gap:9px;padding:0 18px 22px;border-bottom:1px solid rgba(255,255,255,.05);}
.sb-mark{width:30px;height:30px;background:var(--accent);border-radius:8px;display:grid;place-items:center;font-size:11px;font-weight:800;color:var(--accent-text);flex-shrink:0;}
.sb-name{font-size:14.5px;font-weight:700;color:var(--sb-ink);letter-spacing:-.3px;}
.sb-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.sb-nav a{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13.5px;font-weight:500;color:var(--sb-muted);text-decoration:none;transition:background .15s,color .15s;white-space:nowrap;}
.sb-nav a:hover{background:var(--sb-hover);color:var(--sb-ink);}
.sb-nav a.active{background:var(--sb-active);color:var(--accent);font-weight:600;}
.sb-nav a svg{flex-shrink:0;opacity:.7;}
.sb-nav a.active svg{opacity:1;}
.sb-section{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--sb-muted);padding:10px 10px 4px;opacity:.6;}
.sb-user{margin:0 10px;padding:10px;border-radius:8px;background:rgba(255,255,255,.04);display:flex;align-items:center;gap:9px;}
.sb-avatar{width:28px;height:28px;border-radius:50%;background:rgba(181,88,10,.4);display:grid;place-items:center;font-size:11px;font-weight:700;color:#F5D0A0;flex-shrink:0;}
.sb-user-name{font-size:12.5px;font-weight:600;color:var(--sb-ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-user-phase{font-size:11px;color:var(--sb-muted);}
.sb-logout{display:flex;align-items:center;gap:6px;width:calc(100% - 20px);margin:4px 10px 10px;padding:7px 10px;background:none;border:none;cursor:pointer;color:var(--sb-muted);font-size:11.5px;font-family:inherit;border-radius:7px;transition:background .12s,color .12s;text-align:left;}
.sb-logout:hover{background:rgba(255,255,255,.06);color:var(--sb-ink);}

/* ── Main ─────────────────────────────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:var(--tb-h);flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;z-index:10;}
.tb-title{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-.3px;flex:1;}
.tb-count{font-size:12px;font-weight:600;color:var(--ink-muted);background:var(--tag-bg);border:1px solid var(--tag-bd);border-radius:100px;padding:3px 10px;}
.tb-streak{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;color:var(--accent);background:var(--tag-bg);border:1px solid var(--tag-bd);border-radius:100px;padding:4px 11px;}

.filterbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px;position:sticky;top:var(--tb-h);z-index:9;}
.search-wrap{position:relative;flex:1;max-width:280px;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink-muted);pointer-events:none;}
.search-input{width:100%;padding:7px 10px 7px 32px;background:var(--bg);border:1px solid var(--border);border-radius:9px;font-size:13px;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;}
.search-input::placeholder{color:var(--ink-muted);opacity:.5;}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--tag-bg);}
.cat-tabs{display:flex;align-items:center;gap:4px;overflow-x:auto;scrollbar-width:none;}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{padding:6px 13px;border-radius:100px;font-size:12.5px;font-weight:500;color:var(--ink-muted);background:none;border:1px solid var(--border);cursor:pointer;white-space:nowrap;transition:background .15s,color .15s,border-color .15s;}
.cat-tab:hover{color:var(--ink);border-color:var(--ink-muted);}
.cat-tab.active{background:var(--accent);color:var(--accent-text);border-color:var(--accent);font-weight:600;}

/* ── Content ──────────────────────────────────────────────────────────── */
.content{flex:1;overflow-y:auto;padding:24px 24px 40px;}

.fw-section{margin-bottom:32px;}
.fw-section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.fw-section-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-muted);}
.fw-section-count{font-size:11px;font-weight:600;color:var(--accent);background:var(--tag-bg);border:1px solid var(--tag-bd);border-radius:100px;padding:2px 8px;}

.fw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}

.fw-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 18px 16px;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .15s;display:flex;flex-direction:column;gap:10px;}
.fw-card:hover{border-color:var(--accent);box-shadow:0 0 0 3px var(--tag-bg);transform:translateY(-1px);}
.fw-card.expanded{border-color:var(--accent);background:var(--surface);}

.fw-card-top{display:flex;align-items:flex-start;gap:12px;}
.fw-icon{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;flex-shrink:0;font-size:16px;}
.fw-card-meta{flex:1;min-width:0;}
.fw-card-name{font-size:14.5px;font-weight:700;color:var(--ink);letter-spacing:-.2px;margin-bottom:3px;}
.fw-card-sub{font-size:12px;color:var(--ink-muted);line-height:1.45;}
.fw-tags{display:flex;flex-wrap:wrap;gap:5px;}
.fw-tag{font-size:11px;font-weight:500;padding:3px 9px;border-radius:100px;background:var(--tag-bg);border:1px solid var(--tag-bd);color:var(--accent);}
.fw-chevron-wrap{color:var(--ink-muted);transition:transform .2s;flex-shrink:0;margin-top:3px;}
.fw-card.expanded .fw-chevron-wrap{transform:rotate(180deg);}

/* ── Expand body ───────────────────────────────────────────────────────── */
.fw-expand-body{display:none;flex-direction:column;gap:14px;padding-top:12px;border-top:1px solid var(--border);animation:fadeDown .2s ease;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.fw-card.expanded .fw-expand-body{display:flex;}

.fw-expand-label{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px;}

.fw-steps-list{display:flex;flex-direction:column;gap:6px;}
.fw-step-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;line-height:1.55;color:var(--ink);}
.fw-step-num{min-width:20px;height:20px;border-radius:50%;background:var(--tag-bg);border:1px solid var(--tag-bd);display:grid;place-items:center;font-size:10px;font-weight:700;color:var(--accent);flex-shrink:0;margin-top:1px;}

.fw-when{font-size:12.5px;line-height:1.6;color:var(--ink-muted);padding:9px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;}
.fw-when strong{color:var(--ink);font-weight:600;}

/* Example */
.fw-example{font-size:12.5px;line-height:1.65;color:var(--ink);padding:10px 12px;background:var(--tag-bg);border:1px solid var(--tag-bd);border-radius:8px;border-left:3px solid var(--accent);}

/* Mistakes */
.fw-mistakes-list{list-style:none;display:flex;flex-direction:column;gap:6px;}
.fw-mistakes-list li{font-size:12.5px;line-height:1.55;color:var(--ink);padding-left:16px;position:relative;}
.fw-mistakes-list li::before{content:'✕';position:absolute;left:0;color:#C0392B;font-size:10px;font-weight:700;top:2px;}
@media(prefers-color-scheme:dark){.fw-mistakes-list li::before{color:#E74C3C;}}
:root[data-theme="dark"] .fw-mistakes-list li::before{color:#E74C3C;}

/* Phrases */
.fw-phrases-list{display:flex;flex-direction:column;gap:6px;}
.fw-phrase{font-size:12.5px;line-height:1.55;color:var(--ink-muted);font-style:italic;padding:8px 11px;background:var(--surface2);border:1px solid var(--border);border-left:2px solid var(--accent);border-radius:0 8px 8px 0;}

/* Combo tags */
.fw-combo-tags{display:flex;flex-wrap:wrap;gap:5px;}
.fw-combo-tag{font-size:11px;font-weight:500;padding:3px 9px;border-radius:100px;background:rgba(52,130,180,.08);border:1px solid rgba(52,130,180,.22);color:#2a7ab5;}
@media(prefers-color-scheme:dark){.fw-combo-tag{background:rgba(80,160,220,.10);border-color:rgba(80,160,220,.25);color:#6ABEEF;}}
:root[data-theme="dark"] .fw-combo-tag{background:rgba(80,160,220,.10);border-color:rgba(80,160,220,.25);color:#6ABEEF;}

/* Practice prompt */
.fw-prompt-box{display:flex;flex-direction:column;gap:9px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;}
.fw-prompt-q{font-size:13px;line-height:1.6;color:var(--ink);font-weight:500;}
.fw-prompt-reveal{align-self:flex-start;padding:5px 13px;border-radius:100px;border:1px solid var(--accent);background:none;font-size:12px;font-weight:600;color:var(--accent);cursor:pointer;font-family:inherit;transition:background .15s,color .15s;}
.fw-prompt-reveal:hover{background:var(--accent);color:var(--accent-text);}
.fw-prompt-answer{font-size:12.5px;line-height:1.65;color:var(--ink-muted);padding-top:9px;border-top:1px solid var(--border);}

/* Mastered */
.fw-mastered{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;color:#0D6644;background:rgba(16,130,80,.09);border:1px solid rgba(16,130,80,.22);border-radius:100px;padding:3px 9px;}
@media(prefers-color-scheme:dark){.fw-mastered{color:#1EBF78;background:rgba(30,191,120,.10);border-color:rgba(30,191,120,.24);}}
:root[data-theme="dark"] .fw-mastered{color:#1EBF78;background:rgba(30,191,120,.10);border-color:rgba(30,191,120,.24);}
:root[data-theme="light"] .fw-mastered{color:#0D6644;background:rgba(16,130,80,.09);border-color:rgba(16,130,80,.22);}

.mastery-btn{align-self:flex-start;padding:6px 14px;border-radius:100px;border:1px solid var(--border);background:none;font-size:12px;font-weight:600;color:var(--ink-muted);cursor:pointer;font-family:inherit;transition:background .15s,color .15s,border-color .15s;}
.mastery-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--tag-bg);}
.mastery-btn.mastery-btn-done{border-color:rgba(16,130,80,.3);color:#0D6644;background:rgba(16,130,80,.08);}
@media(prefers-color-scheme:dark){.mastery-btn.mastery-btn-done{color:#1EBF78;background:rgba(30,191,120,.10);border-color:rgba(30,191,120,.24);}}
:root[data-theme="dark"] .mastery-btn.mastery-btn-done{color:#1EBF78;background:rgba(30,191,120,.10);border-color:rgba(30,191,120,.24);}

/* Category icon colours */
.icon-prof{background:rgba(181,88,10,.12);}
.icon-mktent{background:rgba(52,130,180,.12);}
.icon-growth{background:rgba(16,130,80,.12);}
.icon-pricing{background:rgba(150,60,180,.12);}
.icon-ma{background:rgba(220,90,60,.12);}
.icon-ops{background:rgba(180,140,20,.12);}
.icon-gen{background:rgba(100,100,100,.12);}

.empty{text-align:center;padding:60px 24px;color:var(--ink-muted);}
.empty-icon{font-size:36px;margin-bottom:12px;}
.empty h3{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:6px;}
.empty p{font-size:14px;}

::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
